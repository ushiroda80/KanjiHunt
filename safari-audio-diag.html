<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Safari Audio Diag v2</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, sans-serif; background: #0a0a14; color: #e0e0e0; padding: 16px 12px 40px; }
  h1 { font-size: 15px; font-weight: 700; color: #ffe600; }
  .sub { font-size: 10px; color: #555; margin-bottom: 12px; }
  .progress { font-size: 12px; color: #ffe600; margin-bottom: 12px; min-height: 20px; }
  
  .run-btn { background: #ffe600; color: #000; border: none; border-radius: 8px; padding: 12px 24px; font-size: 14px; font-weight: 700; cursor: pointer; width: 100%; margin-bottom: 12px; }
  .run-btn:disabled { background: #333; color: #666; }
  
  .section { margin-bottom: 14px; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.06); border-radius: 10px; padding: 10px 12px; }
  .section h2 { font-size: 11px; font-weight: 700; color: #888; margin-bottom: 6px; }
  .row { display: flex; justify-content: space-between; padding: 3px 0; border-bottom: 1px solid rgba(255,255,255,0.02); }
  .row:last-child { border: none; }
  .k { font-size: 10px; color: #666; }
  .v { font-size: 10px; font-family: monospace; text-align: right; max-width: 55%; word-break: break-all; }
  .v.ok { color: #4ade80; }
  .v.fail { color: #f87171; }
  .v.warn { color: #fbbf24; }
  .v.wait { color: #555; }
  
  .copy-btn { background: rgba(255,255,255,0.06); color: #888; border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; padding: 10px; font-size: 12px; font-weight: 600; cursor: pointer; width: 100%; margin-top: 8px; }
  .ver { font-size: 9px; color: #333; text-align: center; margin-top: 12px; }
</style>
</head>
<body>

<h1>Safari Audio Diagnostics</h1>
<p class="sub">Tap Run. Speak into mic during tests (~15s). Then Copy results.</p>
<div class="progress" id="progress"></div>
<button class="run-btn" id="runBtn" onclick="run()">▶ Run All Tests</button>

<div id="results"></div>

<button class="copy-btn" onclick="copyAll()">📋 Copy All Results</button>
<div class="ver">safari-audio-diag v2.0</div>

<script>
const ALL = {};
let stream = null;

function set(sec, key, val, st='ok') {
  if (!ALL[sec]) ALL[sec] = {};
  ALL[sec][key] = { v: val, s: st };
  render();
}

function render() {
  let h = '';
  for (const [sec, data] of Object.entries(ALL)) {
    h += `<div class="section"><h2>${sec}</h2>`;
    for (const [k, d] of Object.entries(data)) {
      h += `<div class="row"><span class="k">${k}</span><span class="v ${d.s}">${d.v}</span></div>`;
    }
    h += '</div>';
  }
  document.getElementById('results').innerHTML = h;
}

function prog(msg) { document.getElementById('progress').textContent = msg; }

// Timeout wrapper - prevents any test from hanging
function withTimeout(fn, ms = 5000) {
  return Promise.race([
    fn(),
    new Promise((_, rej) => setTimeout(() => rej(new Error('TIMEOUT')), ms))
  ]);
}

// ===== 1. ENV =====
function test1() {
  const ua = navigator.userAgent;
  set('1_ENV', 'UA', ua.length > 70 ? ua.substring(0, 70) + '...' : ua);
  set('1_ENV', 'Platform', navigator.platform);
  set('1_ENV', 'iOS', /iPad|iPhone|iPod/.test(ua) ? 'YES' : 'no');
  set('1_ENV', 'getUserMedia', navigator.mediaDevices?.getUserMedia ? '✓' : '✗', navigator.mediaDevices?.getUserMedia ? 'ok' : 'fail');
  set('1_ENV', 'MediaRecorder', typeof MediaRecorder !== 'undefined' ? '✓' : '✗', typeof MediaRecorder !== 'undefined' ? 'ok' : 'fail');
  set('1_ENV', 'AudioContext', !!(window.AudioContext || window.webkitAudioContext) ? '✓' : '✗');
  set('1_ENV', 'SpeechRecognition', !!(window.SpeechRecognition || window.webkitSpeechRecognition) ? '✓' : '✗');
  
  // Check audioWorklet
  try {
    const tmp = new (window.AudioContext || window.webkitAudioContext)();
    set('1_ENV', 'AudioWorklet', tmp.audioWorklet ? '✓' : '✗');
    tmp.close();
  } catch(e) { set('1_ENV', 'AudioWorklet', '✗', 'fail'); }
}

// ===== 2. FORMATS =====
function test2() {
  const fmts = ['audio/webm','audio/webm;codecs=opus','audio/mp4','audio/mp4;codecs=aac','audio/ogg','audio/ogg;codecs=opus','audio/wav'];
  for (const f of fmts) {
    try { const ok = MediaRecorder.isTypeSupported(f); set('2_FORMATS', f, ok ? '✓' : '✗', ok ? 'ok' : 'warn'); }
    catch(e) { set('2_FORMATS', f, 'err', 'fail'); }
  }
}

// ===== 3. ANALYSER =====
async function test3() {
  const ctx = new (window.AudioContext || window.webkitAudioContext)();
  try { await ctx.resume(); } catch(e) {}
  set('3_ANALYSER', 'ctx.state', ctx.state);
  set('3_ANALYSER', 'sampleRate', ctx.sampleRate);

  const src = ctx.createMediaStreamSource(stream);
  const an = ctx.createAnalyser();
  an.fftSize = 512;
  src.connect(an);
  const buf = new Uint8Array(an.frequencyBinCount);

  let maxRms = 0, reads = 0, nonZero = 0;
  const t0 = Date.now();
  while (Date.now() - t0 < 2000) {
    an.getByteTimeDomainData(buf);
    let sum = 0;
    for (let i = 0; i < buf.length; i++) { const v = buf[i]-128; sum += v*v; if (buf[i]!==128) nonZero++; }
    const rms = Math.sqrt(sum / buf.length);
    if (rms > maxRms) maxRms = rms;
    reads++;
    await new Promise(r => setTimeout(r, 50));
  }
  src.disconnect(); ctx.close();

  set('3_ANALYSER', 'readings', reads);
  set('3_ANALYSER', 'maxRMS (0-128)', maxRms.toFixed(2), maxRms > 1 ? 'ok' : 'fail');
  set('3_ANALYSER', 'nonZero samples', nonZero, nonZero > 50 ? 'ok' : 'fail');
  set('3_ANALYSER', 'verdict', maxRms > 1 ? 'WORKS' : 'NO DATA', maxRms > 1 ? 'ok' : 'fail');
}

// ===== 4. SCRIPTPROCESSOR =====
async function test4() {
  const ctx = new (window.AudioContext || window.webkitAudioContext)();
  try { await ctx.resume(); } catch(e) {}
  const src = ctx.createMediaStreamSource(stream);
  let proc;
  try { proc = ctx.createScriptProcessor(4096, 1, 1); }
  catch(e) { set('4_SCRIPTPROC', 'available', 'NO: ' + e.message, 'fail'); ctx.close(); return; }

  src.connect(proc);
  proc.connect(ctx.destination);

  let calls = 0, maxRms = 0, nonZero = 0, total = 0;
  proc.onaudioprocess = (e) => {
    calls++;
    const d = e.inputBuffer.getChannelData(0);
    let s = 0;
    for (let i = 0; i < d.length; i++) { s += d[i]*d[i]; if (Math.abs(d[i]) > 0.001) nonZero++; }
    total += d.length;
    const rms = Math.sqrt(s / d.length);
    if (rms > maxRms) maxRms = rms;
  };

  await new Promise(r => setTimeout(r, 2000));
  proc.disconnect(); src.disconnect(); ctx.close();

  set('4_SCRIPTPROC', 'callbacks', calls, calls > 0 ? 'ok' : 'fail');
  set('4_SCRIPTPROC', 'maxRMS (0-1)', maxRms.toFixed(4), maxRms > 0.005 ? 'ok' : 'fail');
  set('4_SCRIPTPROC', 'nonZero', `${nonZero}/${total}`, nonZero > 10 ? 'ok' : 'fail');
  set('4_SCRIPTPROC', 'verdict', maxRms > 0.005 ? 'WORKS' : 'NO DATA', maxRms > 0.005 ? 'ok' : 'fail');
}

// ===== 5. AUDIOWORKLET =====
async function test5() {
  const ctx = new (window.AudioContext || window.webkitAudioContext)();
  try { await ctx.resume(); } catch(e) {}

  if (!ctx.audioWorklet) {
    set('5_WORKLET', 'verdict', 'NOT AVAILABLE', 'fail');
    ctx.close(); return;
  }

  try {
    const code = `class P extends AudioWorkletProcessor{constructor(){super();this.c=0;}process(i){const d=i[0]?.[0];if(d){let s=0;for(let j=0;j<d.length;j++)s+=d[j]*d[j];this.c++;if(this.c%10===0)this.port.postMessage(Math.sqrt(s/d.length));}return true;}}registerProcessor('p',P);`;
    const blob = new Blob([code], { type: 'application/javascript' });
    const url = URL.createObjectURL(blob);
    await ctx.audioWorklet.addModule(url);
    URL.revokeObjectURL(url);

    const src = ctx.createMediaStreamSource(stream);
    const node = new AudioWorkletNode(ctx, 'p');
    src.connect(node); node.connect(ctx.destination);

    let msgs = 0, maxRms = 0;
    node.port.onmessage = (e) => { msgs++; if (e.data > maxRms) maxRms = e.data; };

    await new Promise(r => setTimeout(r, 2000));
    node.disconnect(); src.disconnect();

    set('5_WORKLET', 'messages', msgs, msgs > 0 ? 'ok' : 'fail');
    set('5_WORKLET', 'maxRMS (0-1)', maxRms.toFixed(4), maxRms > 0.005 ? 'ok' : 'fail');
    set('5_WORKLET', 'verdict', maxRms > 0.005 ? 'WORKS' : 'NO DATA', maxRms > 0.005 ? 'ok' : 'fail');
  } catch(e) {
    set('5_WORKLET', 'error', e.message, 'fail');
    set('5_WORKLET', 'verdict', 'ERROR', 'fail');
  }
  ctx.close();
}

// ===== 6. CHUNK DECODE =====
async function test6() {
  let mime = 'audio/webm';
  for (const f of ['audio/webm;codecs=opus','audio/webm','audio/mp4','audio/wav']) {
    if (MediaRecorder.isTypeSupported(f)) { mime = f; break; }
  }
  set('6_CHUNKDEC', 'format', mime);

  const rec = new MediaRecorder(stream.clone(), { mimeType: mime });
  const decCtx = new (window.AudioContext || window.webkitAudioContext)();
  let chunks = 0, decOk = 0, decFail = 0, maxRms = 0, failReasons = [];

  rec.ondataavailable = async (e) => {
    if (!e.data || e.data.size === 0) return;
    chunks++;
    try {
      const buf = await e.data.arrayBuffer();
      const audio = await decCtx.decodeAudioData(buf);
      const d = audio.getChannelData(0);
      let s = 0;
      for (let i = 0; i < d.length; i++) s += d[i]*d[i];
      const rms = Math.sqrt(s / d.length);
      if (rms > maxRms) maxRms = rms;
      decOk++;
    } catch(err) {
      decFail++;
      if (failReasons.length < 3) failReasons.push(err.message);
    }
  };

  await new Promise(resolve => {
    rec.onstop = () => setTimeout(resolve, 500); // wait for pending decodes
    rec.start(250);
    setTimeout(() => { if (rec.state !== 'inactive') rec.stop(); }, 2000);
  });
  decCtx.close();

  set('6_CHUNKDEC', 'total chunks', chunks);
  set('6_CHUNKDEC', 'decoded OK', decOk, decOk > 0 ? 'ok' : 'fail');
  set('6_CHUNKDEC', 'decode FAIL', decFail, decFail > 0 ? 'warn' : 'ok');
  if (failReasons.length > 0) set('6_CHUNKDEC', 'fail reasons', failReasons.join('; '), 'warn');
  set('6_CHUNKDEC', 'maxRMS (0-1)', maxRms.toFixed(4), maxRms > 0.005 ? 'ok' : 'fail');
  set('6_CHUNKDEC', 'verdict', decOk > 0 && maxRms > 0.005 ? 'WORKS' : 'NO DATA', decOk > 0 && maxRms > 0.005 ? 'ok' : 'fail');

  // Test: full blob decode (assemble all chunks then decode)
  // This tests if the issue is per-chunk vs full recording
  set('6_CHUNKDEC', 'full blob test', 'see test 7');
}

// ===== 7. FULL BLOB + TIMING =====
async function test7() {
  let mime = 'audio/webm';
  for (const f of ['audio/webm;codecs=opus','audio/webm','audio/mp4','audio/wav']) {
    if (MediaRecorder.isTypeSupported(f)) { mime = f; break; }
  }

  const allChunks = [];
  const rec = new MediaRecorder(stream.clone(), { mimeType: mime });
  rec.ondataavailable = (e) => { if (e.data?.size > 0) allChunks.push(e.data); };

  const t0 = performance.now();
  rec.start(500);
  const t1 = performance.now();
  set('7_TIMING', 'rec.start()', Math.round(t1-t0) + 'ms');

  await new Promise(resolve => {
    rec.onstop = resolve;
    setTimeout(() => { if (rec.state !== 'inactive') rec.stop(); }, 2000);
  });

  set('7_TIMING', 'chunks collected', allChunks.length);

  if (allChunks.length > 0) {
    const blob = new Blob(allChunks, { type: mime });
    set('7_TIMING', 'full blob size', blob.size + ' bytes');

    // Try decoding full blob
    const decCtx = new (window.AudioContext || window.webkitAudioContext)();
    try {
      const t2 = performance.now();
      const buf = await blob.arrayBuffer();
      const audio = await decCtx.decodeAudioData(buf);
      const t3 = performance.now();
      const d = audio.getChannelData(0);
      let s = 0;
      for (let i = 0; i < d.length; i++) s += d[i]*d[i];
      const rms = Math.sqrt(s / d.length);
      set('7_TIMING', 'full decode time', Math.round(t3-t2) + 'ms');
      set('7_TIMING', 'full decode RMS', rms.toFixed(4), rms > 0.005 ? 'ok' : 'fail');
      set('7_TIMING', 'full decode samples', d.length);
      set('7_TIMING', 'full decode verdict', rms > 0.005 ? 'WORKS' : 'NO DATA', rms > 0.005 ? 'ok' : 'fail');
    } catch(e) {
      set('7_TIMING', 'full decode', 'FAILED: ' + e.message, 'fail');
    }
    decCtx.close();
  }

  // getUserMedia timing (fresh)
  try {
    const t4 = performance.now();
    const s2 = await navigator.mediaDevices.getUserMedia({ audio: true });
    const t5 = performance.now();
    s2.getTracks().forEach(t => t.stop());
    set('7_TIMING', 'getUserMedia', Math.round(t5-t4) + 'ms');
  } catch(e) { set('7_TIMING', 'getUserMedia', 'err', 'fail'); }
}

// ===== 8. SUMMARY =====
function test8() {
  const working = [];
  if (ALL['3_ANALYSER']?.verdict?.v === 'WORKS') working.push('AnalyserNode');
  if (ALL['4_SCRIPTPROC']?.verdict?.v === 'WORKS') working.push('ScriptProcessor');
  if (ALL['5_WORKLET']?.verdict?.v === 'WORKS') working.push('AudioWorklet');
  if (ALL['6_CHUNKDEC']?.verdict?.v === 'WORKS') working.push('ChunkDecode(250ms)');
  if (ALL['7_TIMING']?.['full decode verdict']?.v === 'WORKS') working.push('FullBlobDecode');

  set('8_SUMMARY', '✅ Working methods', working.length > 0 ? working.join(', ') : 'NONE', working.length > 0 ? 'ok' : 'fail');
  set('8_SUMMARY', '❌ Failed methods', Object.entries({
    'AnalyserNode': ALL['3_ANALYSER']?.verdict?.v !== 'WORKS',
    'ScriptProcessor': ALL['4_SCRIPTPROC']?.verdict?.v !== 'WORKS',
    'AudioWorklet': ALL['5_WORKLET']?.verdict?.v !== 'WORKS',
    'ChunkDecode': ALL['6_CHUNKDEC']?.verdict?.v !== 'WORKS',
    'FullBlobDecode': ALL['7_TIMING']?.['full decode verdict']?.v !== 'WORKS',
  }).filter(([,f]) => f).map(([n]) => n).join(', ') || 'none', 'warn');
  
  // Recommendation
  let rec = 'No viable method found — tap-to-submit only';
  if (working.includes('ScriptProcessor')) rec = 'Use ScriptProcessor for real-time silence detection';
  else if (working.includes('AudioWorklet')) rec = 'Use AudioWorklet for real-time silence detection';
  else if (working.includes('AnalyserNode')) rec = 'Use AnalyserNode for real-time silence detection';
  else if (working.includes('FullBlobDecode')) rec = 'Post-hoc silence trim possible (not real-time)';
  else if (working.includes('ChunkDecode(250ms)')) rec = 'Use chunk decode for 250ms-resolution silence detection';
  set('8_SUMMARY', '💡 Recommendation', rec);
}

// ===== RUN ALL =====
async function run() {
  const btn = document.getElementById('runBtn');
  btn.disabled = true;
  prog('Getting mic...');

  try {
    stream = await navigator.mediaDevices.getUserMedia({ audio: true });
  } catch(e) {
    prog('Mic denied!');
    set('1_ENV', 'mic', 'DENIED: ' + e.message, 'fail');
    btn.disabled = false;
    return;
  }

  const tests = [
    ['1/7 Environment', test1],
    ['2/7 Formats', test2],
    ['3/7 AnalyserNode (2s — speak!)', test3],
    ['4/7 ScriptProcessor (2s — speak!)', test4],
    ['5/7 AudioWorklet (2s — speak!)', test5],
    ['6/7 Chunk decode (2s — speak!)', test6],
    ['7/7 Full blob + timing (2s)', test7],
  ];

  for (const [label, fn] of tests) {
    prog(label);
    try {
      await withTimeout(async () => await fn(), 8000);
    } catch(e) {
      const sec = label.split(' ')[1];
      set(sec || label, 'error', 'TIMEOUT or crash: ' + e.message, 'fail');
    }
  }

  prog('Building summary...');
  test8();
  prog('✓ Done! Copy results below.');

  stream.getTracks().forEach(t => t.stop());
  btn.textContent = '✓ Complete';
}

// ===== COPY =====
function copyAll() {
  let t = '=== Safari Audio Diagnostics v2 ===\n';
  t += `Date: ${new Date().toISOString()}\n`;
  t += `UA: ${navigator.userAgent}\n\n`;
  for (const [sec, data] of Object.entries(ALL)) {
    t += `--- ${sec} ---\n`;
    for (const [k, d] of Object.entries(data)) t += `${k}: ${d.v}\n`;
    t += '\n';
  }
  if (navigator.clipboard?.writeText) {
    navigator.clipboard.writeText(t).then(() => alert('Copied!')).catch(() => fallbackCopy(t));
  } else { fallbackCopy(t); }
}
function fallbackCopy(t) {
  const ta = document.createElement('textarea');
  ta.value = t; ta.style.position = 'fixed'; ta.style.left = '-9999px';
  document.body.appendChild(ta); ta.select();
  try { document.execCommand('copy'); alert('Copied!'); } catch(e) { alert('Copy failed — select all text manually'); }
  document.body.removeChild(ta);
}
</script>
</body>
</html>
