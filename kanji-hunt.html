<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Kanji Hunt</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#ffe600">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Kanji Hunt">
  <link rel="apple-touch-icon" href="icon-512.svg">
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; }
    input { font-family: inherit; }
    /* Kanji font options - uncomment one to try different styles */
    @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;500&display=swap');
    @keyframes pinToastFade {
      0% { opacity: 0; transform: translateY(4px); }
      15% { opacity: 1; transform: translateY(0); }
      70% { opacity: 1; }
      100% { opacity: 0; }
    }
  </style>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js').catch(() => {});
    }
  </script>
</head>
<body>
  <div id="root"></div>
  
  <script type="text/babel">
    const { useState, useEffect, useRef, useCallback } = React;
    
    // ============================================
    // API CONFIGURATION
    // ============================================
    
    // Store API key in localStorage
    const getStoredAPIKey = () => localStorage.getItem('wordHunter_apiKey') || '';
    const setStoredAPIKey = (key) => localStorage.setItem('wordHunter_apiKey', key);
    
    // Store default capture language preference
    const getStoredDefaultLang = () => localStorage.getItem('wordHunter_defaultLang') || 'ja';
    const setStoredDefaultLang = (lang) => localStorage.setItem('wordHunter_defaultLang', lang);
    
    // Store Google Cloud TTS API key
    const getStoredGoogleTTSKey = () => localStorage.getItem('wordHunter_googleTTSKey') || '';
    const setStoredGoogleTTSKey = (key) => localStorage.setItem('wordHunter_googleTTSKey', key);
    
    // ============================================
    // KANJIUM PITCH ACCENT DATABASE
    // ============================================
    // Source: https://github.com/mifunetoshiro/kanjium (CC BY-SA 4.0)
    // Format: TSV with kanji\treading\taccent_number
    // accent_number: 0=heiban (no drop), 1=atamadaka, N=drop after mora N
    
    const PITCH_DB_KEY = 'wordHunter_pitchDB';
    const PITCH_DB_META_KEY = 'wordHunter_pitchDB_meta';
    
    const getPitchDB = () => {
      try {
        const raw = localStorage.getItem(PITCH_DB_KEY);
        return raw ? JSON.parse(raw) : null;
      } catch(e) { return null; }
    };
    
    const getPitchDBMeta = () => {
      try {
        const raw = localStorage.getItem(PITCH_DB_META_KEY);
        return raw ? JSON.parse(raw) : null;
      } catch(e) { return null; }
    };
    
    // Parse Kanjium accents.txt (TSV: kanji\treading\taccent) into a lookup map
    // Key: "kanji:reading" or just "reading" for kana-only words
    // Value: accent number (downstep position)
    const importPitchDB = (tsvText) => {
      const db = {};
      let count = 0;
      const lines = tsvText.split('\n');
      for (const line of lines) {
        const parts = line.split('\t');
        if (parts.length >= 3) {
          const kanji = parts[0].trim();
          const reading = parts[1].trim();
          const accent = parseInt(parts[2].trim(), 10);
          if (kanji && reading && !isNaN(accent)) {
            // Store with kanji key and reading-only key
            db[kanji + ':' + reading] = accent;
            if (!db[reading]) db[reading] = accent; // first reading wins for kana-only lookup
            count++;
          }
        }
      }
      localStorage.setItem(PITCH_DB_KEY, JSON.stringify(db));
      localStorage.setItem(PITCH_DB_META_KEY, JSON.stringify({
        count,
        importedAt: new Date().toISOString()
      }));
      return count;
    };
    
    // Convert downstep position to pitch array [{kana, pitch, romaji}]
    const downstepToPitchArray = (reading, downstep) => {
      // Split reading into morae (not characters)
      const morae = splitIntoMorae(reading);
      const n = morae.length;
      
      return morae.map((mora, i) => {
        let pitch;
        if (downstep === 0) {
          // Heiban: first mora low, rest high
          pitch = i === 0 ? 0 : 1;
        } else if (downstep === 1) {
          // Atamadaka: first mora high, rest low
          pitch = i === 0 ? 1 : 0;
        } else {
          // Nakadaka/Odaka: low, then high, then drops after position downstep
          if (i === 0) pitch = 0;
          else if (i < downstep) pitch = 1;
          else pitch = 0;
        }
        return {
          kana: mora,
          pitch,
          romaji: moraToRomaji(mora)
        };
      });
    };
    
    // Split Japanese text into morae
    const splitIntoMorae = (text) => {
      const morae = [];
      const chars = [...text];
      for (let i = 0; i < chars.length; i++) {
        const c = chars[i];
        const next = chars[i + 1];
        // Check if next char is a small kana (part of compound mora)
        if (next && /[ゃゅょャュョァィゥェォ]/.test(next)) {
          morae.push(c + next);
          i++; // skip next
        } else {
          morae.push(c);
        }
      }
      return morae;
    };
    
    // Basic mora to romaji conversion
    const moraToRomaji = (mora) => {
      const map = {
        'あ':'a','い':'i','う':'u','え':'e','お':'o',
        'か':'ka','き':'ki','く':'ku','け':'ke','こ':'ko',
        'さ':'sa','し':'shi','す':'su','せ':'se','そ':'so',
        'た':'ta','ち':'chi','つ':'tsu','て':'te','と':'to',
        'な':'na','に':'ni','ぬ':'nu','ね':'ne','の':'no',
        'は':'ha','ひ':'hi','ふ':'fu','へ':'he','ほ':'ho',
        'ま':'ma','み':'mi','む':'mu','め':'me','も':'mo',
        'や':'ya','ゆ':'yu','よ':'yo',
        'ら':'ra','り':'ri','る':'ru','れ':'re','ろ':'ro',
        'わ':'wa','を':'wo','ん':'n',
        'が':'ga','ぎ':'gi','ぐ':'gu','げ':'ge','ご':'go',
        'ざ':'za','じ':'ji','ず':'zu','ぜ':'ze','ぞ':'zo',
        'だ':'da','ぢ':'di','づ':'du','で':'de','ど':'do',
        'ば':'ba','び':'bi','ぶ':'bu','べ':'be','ぼ':'bo',
        'ぱ':'pa','ぴ':'pi','ぷ':'pu','ぺ':'pe','ぽ':'po',
        'っ':'Q',
        'きゃ':'kya','きゅ':'kyu','きょ':'kyo',
        'しゃ':'sha','しゅ':'shu','しょ':'sho',
        'ちゃ':'cha','ちゅ':'chu','ちょ':'cho',
        'にゃ':'nya','にゅ':'nyu','にょ':'nyo',
        'ひゃ':'hya','ひゅ':'hyu','ひょ':'hyo',
        'みゃ':'mya','みゅ':'myu','みょ':'myo',
        'りゃ':'rya','りゅ':'ryu','りょ':'ryo',
        'ぎゃ':'gya','ぎゅ':'gyu','ぎょ':'gyo',
        'じゃ':'ja','じゅ':'ju','じょ':'jo',
        'びゃ':'bya','びゅ':'byu','びょ':'byo',
        'ぴゃ':'pya','ぴゅ':'pyu','ぴょ':'pyo'
      };
      return map[mora] || mora;
    };
    
    // Look up pitch accent from Kanjium DB
    // Returns pitch array or null if not found
    const lookupPitchAccent = (kanji, reading) => {
      const db = getPitchDB();
      if (!db) return null;
      
      // Try exact kanji:reading match first
      const key1 = kanji + ':' + reading;
      if (db[key1] !== undefined) {
        return downstepToPitchArray(reading, db[key1]);
      }
      
      // Try reading-only match
      if (db[reading] !== undefined) {
        return downstepToPitchArray(reading, db[reading]);
      }
      
      return null;
    };
    
    // ============================================
    // PROMPT TEMPLATES
    // ============================================
    // All API prompt text lives here. Fetch functions below reference these.
    // Edit prompts here; edit fetch/parse logic in the functions.
    
    const PROMPTS = {
      // Phase 1: Core word data (Sonnet)
      coreData: (word, contextHint) => `I need basic Japanese word data for: "${word}"
${contextHint}
Return ONLY valid JSON (no markdown, no explanation) in this exact format:
{
  "kanji": "${word}",
  "hiragana": "reading in hiragana",
  "romaji": "ro-ma-ji with hyphens between syllables",
  "english": "primary English meaning",
  "definitions": [
    {
      "rank": "primary",
      "frequency": "common",
      "meaning": "short English meaning (2-4 words)",
      "definition": "Super concise two sentence ELI5 definition with usage nuance."
    }
  ],
  "jlpt": "N5/N4/N3/N2/N1",
  "contextUsage": {
    "daily": 0-3,
    "media": 0-3,
    "business": 0-3,
    "academic": 0-3
  }
}

For definitions:
- "rank": "primary" for the most common meaning, "secondary" for the next, "tertiary" for a third.
- "frequency": This is about how common this MEANING is for THIS WORD, not how common the word itself is.
  - "common": this is a standard/expected meaning of the word. If a word has only one meaning, it is ALWAYS "common".
  - "uncommon": a secondary meaning that most learners wouldn't know.
  - "rare": an obscure or literary meaning.
- Include ALL genuinely distinct meanings (up to 3). Many Japanese words have 2-3 distinct meanings that learners need to know.
- Only omit a meaning if it is truly archaic or never used in modern Japanese.
- For example, 控える has 3 distinct meanings: to refrain, to have coming up, and to wait quietly.
For contextUsage: 0 = not appropriate, 1 = acceptable but unusual, 2 = natural fit, 3 = ideal/perfect fit.
Return ONLY the JSON object, nothing else.`,

      // Single kanji context hints (used by coreData)
      singleKanjiWithContext: (sourceContext) =>
        `\nIMPORTANT: This single kanji was encountered in the word "${sourceContext}". For "english", give the most relevant meaning of this kanji as it contributes to "${sourceContext}". For "definition", explain what this kanji means in the context of "${sourceContext}" and other common words that use it. Do NOT give an obscure or archaic meaning.`,
      singleKanjiAlone:
        `\nIMPORTANT: This is a single kanji character. For "english", give its most common and widely-used meaning. For "definition", explain the kanji's core meaning and mention 2-3 common words that use it. Do NOT give obscure or archaic meanings.`,

      // Phase 2a: Pitch accent + example sentences (Sonnet)
      pitchAndSentences: (word, skipPitch, level, defHint) => `I need extended Japanese word data for: "${word}"

Return ONLY valid JSON (no markdown, no explanation) in this exact format:
{${skipPitch ? '' : `
  "pitchAccent": [
    {"kana": "あ", "pitch": 0, "romaji": "a"}
  ],`}
  "sentences": [
    {
      "id": 1,
      "defMeaning": "the English meaning this sentence demonstrates",
      "parts": [
        {"text": "漢字", "reading": "かんじ"},
        {"text": "テキスト"},
        {"text": "${word}", "reading": "reading", "highlight": true}
      ],
      "english": "English translation"
    }
  ]
}
${skipPitch ? '' : `For pitchAccent:
- Break the word into MORAE (not characters). Each mora is one beat: ん counts as its own mora, long vowels like おう are two morae (お and う separately), っ is its own mora, きゃ is ONE mora.
- pitch: 0 = low, 1 = high. Use the standard NHK pitch accent dictionary pattern.
- Include accurate romaji for each mora.
- For example: 天使 (てんし) = [{"kana":"て","pitch":1,"romaji":"te"},{"kana":"ん","pitch":0,"romaji":"n"},{"kana":"し","pitch":0,"romaji":"shi"}]
- For example: 花 (はな) = [{"kana":"は","pitch":0,"romaji":"ha"},{"kana":"な","pitch":1,"romaji":"na"}]`}
For sentences: provide example sentences using ${level}-level grammar and vocabulary, except for the target word "${word}" itself. The surrounding sentence should be easy to understand for a ${level} learner.${defHint}

Return ONLY the JSON object, nothing else.`,

      // Phase 2b: Kanji details (Haiku)
      kanjiDetails: (word) => `List the kanji characters in the Japanese word: "${word}"

Return ONLY valid JSON (no markdown, no explanation):
{"kanjiDetails": [
  {"kanji": "字", "meaning": "meaning of this kanji", "strokeCount": 6}
]}

Include each kanji character in the word with its primary meaning and stroke count. Only include actual kanji characters, not hiragana or katakana.

Return ONLY the JSON object.`,

      // English→Japanese resolution (Haiku)
      resolveEnglish: (englishWord) => `The user spoke the English word "${englishWord}" via speech recognition.

Return a JSON array of Japanese translations. Rules:
- ALWAYS include the literal word "${englishWord}" as the first entry
- ONLY include additional entries if there is a TRUE homophone (identical or near-identical pronunciation in English, e.g. profit/prophet, flower/flour, right/write, bare/bear) OR if the word has genuinely different meanings in Japanese (e.g. "sentence" → 文章 writing/判決 legal verdict)
- Do NOT include words that merely sound vaguely similar or share a root
- For each entry, include a "confidence" score (0-100) representing how likely the user meant this word given speech recognition context
- For each entry, include a "description" field: a brief 3-6 word English clarification that distinguishes this meaning (e.g. "written text or passage", "legal court verdict")

Return ONLY valid JSON (no markdown):
[
  {"english": "word", "kanji": "漢字", "hiragana": "ひらがな", "confidence": 95, "description": "brief clarifying phrase"}
]

Return 1-3 options max. Return ONLY the JSON array.`
    };

    // ============================================
    // API HELPERS
    // ============================================
    
    const ANTHROPIC_HEADERS = (apiKey) => ({
      'Content-Type': 'application/json',
      'x-api-key': apiKey,
      'anthropic-version': '2023-06-01',
      'anthropic-dangerous-direct-browser-access': 'true'
    });
    
    const callAnthropic = async (apiKey, model, maxTokens, prompt) => {
      const response = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: ANTHROPIC_HEADERS(apiKey),
        body: JSON.stringify({
          model,
          max_tokens: maxTokens,
          messages: [{ role: 'user', content: prompt }]
        })
      });
      if (!response.ok) {
        const errorBody = await response.text();
        throw new Error(`API error ${response.status}: ${errorBody.slice(0, 200)}`);
      }
      const data = await response.json();
      let raw = data.content[0].text.trim();
      raw = raw.replace(/^```(?:json)?\s*/i, '').replace(/\s*```$/, '').trim();
      return JSON.parse(raw);
    };

    // ============================================
    // API FETCH FUNCTIONS
    // ============================================
    
    // Phase 1: Quick fetch — kanji, reading, definition, context (small, fast response)
    const fetchCoreData = async (word, apiKey, sourceContext) => {
      if (!apiKey) { console.warn('[fetchCoreData] No API key'); return null; }
      try {
        const isSingleKanji = [...word].length === 1 && /[\u4e00-\u9faf]/.test(word);
        const contextHint = isSingleKanji && sourceContext
          ? PROMPTS.singleKanjiWithContext(sourceContext)
          : isSingleKanji ? PROMPTS.singleKanjiAlone : '';
        
        console.log('[fetchCoreData] Calling API for:', word, sourceContext ? '(from: ' + sourceContext + ')' : '');
        const parsed = await callAnthropic(apiKey, 'claude-sonnet-4-20250514', 1000, PROMPTS.coreData(word, contextHint));
        console.log('[fetchCoreData] Parsed result:', parsed);
        return parsed;
      } catch (error) {
        console.error('[fetchCoreData] FAILED:', error.message, error);
        return null;
      }
    };
    
    // Phase 2a: Sonnet — pitch accent + example sentences
    const fetchPitchAndSentences = async (word, apiKey, skipPitch = false, jlpt = null, definitions = []) => {
      if (!apiKey) return null;
      const level = jlpt || 'N3';
      // Sentence context should be one level easier so learner focuses on the target word
      const sentenceLevel = { 'N1': 'N2', 'N2': 'N3', 'N3': 'N4', 'N4': 'N5', 'N5': 'N5' }[level] || 'N4';
      const defMeanings = definitions.map(d => d.meaning).filter(Boolean);
      const defHint = defMeanings.length > 1
        ? `\nThis word has these distinct meanings: ${defMeanings.map((m, i) => `${i+1}. "${m}"`).join(', ')}. Provide exactly 1 example sentence for EACH meaning. Set "defMeaning" to the exact meaning string.`
        : defMeanings.length === 1
        ? `\nThis word means "${defMeanings[0]}". Provide 3 example sentences. Set "defMeaning" to "${defMeanings[0]}" for all.`
        : '\nProvide 3 example sentences. Set "defMeaning" to a short English meaning for each.';
      try {
        return await callAnthropic(apiKey, 'claude-sonnet-4-20250514', 2000, PROMPTS.pitchAndSentences(word, skipPitch, sentenceLevel, defHint));
      } catch (error) {
        console.error('[fetchPitchAndSentences] FAILED:', error);
        return null;
      }
    };

    // Phase 2b: Haiku — kanji details
    const fetchKanjiDetails = async (word, apiKey) => {
      try {
        const parsed = await callAnthropic(apiKey, 'claude-haiku-4-5-20251001', 500, PROMPTS.kanjiDetails(word));
        return parsed.kanjiDetails || [];
      } catch (error) {
        console.error('[fetchKanjiDetails] FAILED:', error);
        return [];
      }
    };

    // Post-process sentence parts: split mixed kanji+kana chunks so furigana only sits above kanji
    const splitMixedPart = (part) => {
      const { text, reading, highlight } = part;
      if (!reading || !text) return [part];
      
      const isKanji = c => /[\u4e00-\u9faf]/.test(c);
      const isKana = c => /[\u3040-\u309f\u30a0-\u30ff]/.test(c);
      const toHiragana = c => c.charCodeAt(0) >= 0x30A0 && c.charCodeAt(0) <= 0x30FF ? String.fromCharCode(c.charCodeAt(0) - 0x60) : c;
      
      const hasKanjiChar = [...text].some(isKanji);
      const hasKanaChar = [...text].some(isKana);
      if (!hasKanjiChar || !hasKanaChar) return [part];
      
      // Split text into runs of kanji vs kana
      const segments = [];
      let cur = { chars: '', type: null };
      for (const ch of text) {
        const type = isKanji(ch) ? 'kanji' : 'kana';
        if (type !== cur.type && cur.chars) { segments.push({ ...cur }); cur = { chars: '', type: null }; }
        cur.chars += ch; cur.type = type;
      }
      if (cur.chars) segments.push(cur);
      if (segments.length <= 1) return [part];
      
      // Match kana anchors in reading to split out kanji readings
      const rc = [...reading];
      let ri = 0;
      const result = [];
      
      for (let si = 0; si < segments.length; si++) {
        const seg = segments[si];
        if (seg.type === 'kana') {
          const sc = [...seg.chars];
          let ok = true;
          for (let i = 0; i < sc.length; i++) {
            if (!rc[ri + i] || toHiragana(sc[i]) !== toHiragana(rc[ri + i])) { ok = false; break; }
          }
          if (!ok) return [part]; // bail
          ri += sc.length;
          result.push({ text: seg.chars, ...(highlight ? { highlight: true } : {}) });
        } else {
          // Find where next kana anchor starts in reading
          const nextKana = segments[si + 1];
          if (nextKana && nextKana.type === 'kana') {
            const anchor = toHiragana([...nextKana.chars][0]);
            let end = ri;
            while (end < rc.length && toHiragana(rc[end]) !== anchor) end++;
            result.push({ text: seg.chars, reading: rc.slice(ri, end).join(''), ...(highlight ? { highlight: true } : {}) });
            ri = end;
          } else {
            result.push({ text: seg.chars, reading: rc.slice(ri).join(''), ...(highlight ? { highlight: true } : {}) });
            ri = rc.length;
          }
        }
      }
      return result;
    };
    
    const splitSentenceParts = (sentences) => {
      if (!sentences) return [];
      return sentences.map(s => ({
        ...s,
        parts: s.parts ? s.parts.flatMap(splitMixedPart) : []
      }));
    };

    // Phase 2 wrapper: Sonnet for pitch+sentences, Haiku for kanji, in parallel
    const fetchExtendedData = async (word, apiKey, skipPitch = false, jlpt = null, definitions = []) => {
      if (!apiKey) return null;
      try {
        const [sonnetData, kanjiDetails] = await Promise.all([
          fetchPitchAndSentences(word, apiKey, skipPitch, jlpt, definitions),
          fetchKanjiDetails(word, apiKey)
        ]);
        const processedSentences = splitSentenceParts(sonnetData?.sentences || []);
        console.log('[fetchExtendedData] sentences:', processedSentences.length, 'kanji:', kanjiDetails.length);
        return {
          pitchAccent: sonnetData?.pitchAccent || [],
          sentences: processedSentences,
          kanjiDetails
        };
      } catch (error) {
        console.error('Failed to fetch extended data:', error);
        return null;
      }
    };
    
    // Resolve English word → Japanese candidates via API (considers homophones)
    const resolveEnglishToJapanese = async (englishWord, apiKey) => {
      if (!apiKey) return null;
      try {
        const parsed = await callAnthropic(apiKey, 'claude-haiku-4-5-20251001', 300, PROMPTS.resolveEnglish(englishWord));
        return Array.isArray(parsed) ? parsed : [parsed];
      } catch (error) {
        console.error('Failed to resolve English→Japanese:', error);
        return null;
      }
    };
    
    // Google Cloud TTS — natural Japanese pronunciation
    const playGoogleTTS = async (text, googleTTSKey, speed = 1.0, hiraganaHint = null) => {
      if (!googleTTSKey) return null;
      try {
        let input;
        if (hiraganaHint) {
          const ssml = `<speak><phoneme alphabet="x-amazon-pron-kana" ph="${hiraganaHint}">${text}</phoneme></speak>`;
          input = { ssml };
        } else {
          input = { text };
        }
        
        const response = await fetch(`https://texttospeech.googleapis.com/v1/text:synthesize?key=${googleTTSKey}`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            input,
            voice: {
              languageCode: 'ja-JP',
              name: 'ja-JP-Neural2-B',
              ssmlGender: 'FEMALE'
            },
            audioConfig: {
              audioEncoding: 'MP3',
              speakingRate: speed,
              pitch: 0
            }
          })
        });
        if (!response.ok) {
          const err = await response.text();
          console.error('[GoogleTTS] Error:', response.status, err);
          if (hiraganaHint) {
            console.warn('[GoogleTTS] SSML failed, retrying with plain text...');
            return playGoogleTTS(text, googleTTSKey, speed, null);
          }
          return null;
        }
        const data = await response.json();
        return new Audio('data:audio/mp3;base64,' + data.audioContent);
      } catch (error) {
        console.error('[GoogleTTS] Failed:', error);
        return null;
      }
    };
    
    // Google Cloud Speech-to-Text — fallback for iOS Safari and non-Chrome browsers
    // Uses MediaRecorder API (works everywhere) → sends audio to Google Cloud STT API
    const recognizeWithCloudSTT = (googleKey, lang = 'ja-JP') => {
      let stopFn = null;
      const promise = new Promise(async (resolve, reject) => {
        if (!googleKey) return reject(new Error('No Google API key'));
        
        let stream;
        try {
          stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        } catch (e) {
          return reject(new Error('mic-denied'));
        }
        
        // Detect supported audio format (Safari = mp4/aac, Chrome = webm/opus)
        let mimeType = 'audio/webm';
        const formats = ['audio/webm;codecs=opus', 'audio/webm', 'audio/mp4', 'audio/wav'];
        for (const fmt of formats) {
          if (MediaRecorder.isTypeSupported(fmt)) { mimeType = fmt; break; }
        }
        console.log('[CloudSTT] Using format:', mimeType);
        
        const recorder = new MediaRecorder(stream, { mimeType });
        const chunks = [];
        let stopped = false;
        
        recorder.ondataavailable = (e) => {
          if (e.data && e.data.size > 0) chunks.push(e.data);
        };
        
        recorder.onstop = async () => {
          stream.getTracks().forEach(t => t.stop());
          if (chunks.length === 0) return reject(new Error('no-audio'));
          
          const blob = new Blob(chunks, { type: mimeType });
          console.log('[CloudSTT] Audio blob:', blob.size, 'bytes,', mimeType);
          
          // Convert to base64
          const base64 = await new Promise((res, rej) => {
            const reader = new FileReader();
            reader.onloadend = () => res(reader.result.split(',')[1]);
            reader.onerror = () => rej(new Error('read-failed'));
            reader.readAsDataURL(blob);
          });
          
          // Map MIME to Google STT encoding parameter
          let encoding = 'WEBM_OPUS';
          if (mimeType.includes('mp4') || mimeType.includes('m4a')) encoding = 'ENCODING_UNSPECIFIED';
          else if (mimeType.includes('wav')) encoding = 'LINEAR16';
          else if (mimeType.includes('ogg')) encoding = 'OGG_OPUS';
          
          try {
            const response = await fetch(`https://speech.googleapis.com/v1/speech:recognize?key=${googleKey}`, {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({
                config: {
                  encoding,
                  languageCode: lang,
                  maxAlternatives: 5,
                  model: 'default',
                },
                audio: { content: base64 },
              }),
            });
            
            if (!response.ok) {
              // If WEBM_OPUS fails (some Safari versions), retry with OGG_OPUS
              if (encoding === 'WEBM_OPUS') {
                console.warn('[CloudSTT] WEBM_OPUS failed, retrying with OGG_OPUS...');
                const retry = await fetch(`https://speech.googleapis.com/v1/speech:recognize?key=${googleKey}`, {
                  method: 'POST',
                  headers: { 'Content-Type': 'application/json' },
                  body: JSON.stringify({
                    config: { encoding: 'OGG_OPUS', languageCode: lang, maxAlternatives: 5 },
                    audio: { content: base64 },
                  }),
                });
                if (!retry.ok) {
                  console.error('[CloudSTT] Retry failed:', await retry.text());
                  return reject(new Error('stt-api-error'));
                }
                return resolve(parseSTTResults(await retry.json()));
              }
              console.error('[CloudSTT] API error:', await response.text());
              return reject(new Error('stt-api-error'));
            }
            
            resolve(parseSTTResults(await response.json()));
          } catch (e) {
            console.error('[CloudSTT] Network error:', e);
            reject(new Error('stt-network-error'));
          }
        };
        
        // Start recording with 1000ms timeslice (helps Safari produce valid chunks)
        recorder.start(1000);
        console.log('[CloudSTT] Recording started');
        
        // Auto-stop after 3.5 seconds (single word capture doesn't need more)
        const autoStop = setTimeout(() => {
          if (!stopped) { stopped = true; recorder.stop(); }
        }, 3500);
        
        stopFn = () => {
          if (!stopped) { stopped = true; clearTimeout(autoStop); recorder.stop(); }
        };
      });
      
      promise.stop = stopFn;
      return promise;
    };
    
    // Parse Google Cloud STT response into our standard format
    const parseSTTResults = (data) => {
      if (!data.results || data.results.length === 0) {
        return { transcript: '', alternatives: [], confidence: 0 };
      }
      const result = data.results[0];
      const alts = (result.alternatives || []).map(a => ({
        transcript: (a.transcript || '').replace(/\s+/g, ''),
        confidence: a.confidence || 0,
      }));
      return {
        transcript: alts[0]?.transcript || '',
        alternatives: alts.slice(0, 3),
        confidence: alts[0]?.confidence || 0,
      };
    };
    
    // Determine best available speech input method
    const getSpeechMethod = (googleKey) => {
      const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) || 
        (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);
      // iOS has webkitSpeechRecognition in window but it doesn't actually work
      if (isIOS) return (typeof MediaRecorder !== 'undefined' && !!googleKey) ? 'cloudSTT' : 'manual';
      if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) return 'webSpeech';
      if (typeof MediaRecorder !== 'undefined' && !!googleKey) return 'cloudSTT';
      return 'manual';
    };
    
    // Estimate per-mora timing from total audio duration
    const getMoraTimings = (pitchAccent, totalDuration) => {
      if (!pitchAccent || pitchAccent.length === 0) return [];
      const speechDuration = totalDuration * 0.85;
      const startOffset = totalDuration * 0.08;
      const moraWeight = (kana) => {
        if (kana === 'っ') return 0.5;
        if (kana === 'ん') return 0.8;
        if (kana === 'ー') return 1.2;
        if (/^[うおいえあ]$/.test(kana)) return 0.9;
        return 1.0;
      };
      const weights = pitchAccent.map(m => moraWeight(m.kana));
      const totalWeight = weights.reduce((a, b) => a + b, 0);
      const timings = [];
      let elapsed = startOffset;
      for (let i = 0; i < pitchAccent.length; i++) {
        const dur = (weights[i] / totalWeight) * speechDuration;
        timings.push({ start: elapsed, duration: dur });
        elapsed += dur;
      }
      return timings;
    };

    };
    // Source: https://github.com/stephenmk/yomitan-jlpt-vocab (CC BY-SA 4.0)

    const JLPT_DB_KEY = 'wordHunter_jlptDB';
    const JLPT_DB_META_KEY = 'wordHunter_jlptDB_meta';
    
    const getJlptDB = () => {

    // Import pre-converted JLPT lookup JSON: {"word": "N1", "食べる": "N5", ...}
    const importJlptDB = (jsonText) => {

        }));

      } catch(e) {
        console.error('[JLPT DB] Parse error:', e);
        return 0;
      }
    };
    
    // Lookup JLPT level for a word
    const lookupJlptLevel = (kanji, hiragana) => {
      const db = getJlptDB();
      if (!db) return null;
      return db[kanji] || db[hiragana] || null;
    };

    // ============================================
    // KANJI READINGS DATABASE (KANJIDIC)
    // ============================================
    // Source: KANJIDIC via davidluzgouveia/kanji-data (CC BY-SA 4.0)
    // Format: {"kanji": ["reading1", "reading2", ...]} — all readings in hiragana
    // On'yomi converted from katakana, kun'yomi stems (okurigana stripped)
    // Used to split furigana across consecutive kanji characters
    
    const READINGS_DB_KEY = 'wordHunter_readingsDB';
    const READINGS_DB_META_KEY = 'wordHunter_readingsDB_meta';
    
    const getReadingsDB = () => {
      try {
        const raw = localStorage.getItem(READINGS_DB_KEY);
        return raw ? JSON.parse(raw) : null;
      } catch(e) { return null; }
    };
    
    const getReadingsDBMeta = () => {
      try {
        const raw = localStorage.getItem(READINGS_DB_META_KEY);
        return raw ? JSON.parse(raw) : null;
      } catch(e) { return null; }
    };
    
    // Import pre-converted readings JSON: {"連": ["れん"], "続": ["ぞく", "つづ"], ...}
    const importReadingsDB = (jsonText) => {
      try {
        const db = JSON.parse(jsonText);
        const count = Object.keys(db).length;
        localStorage.setItem(READINGS_DB_KEY, JSON.stringify(db));
        localStorage.setItem(READINGS_DB_META_KEY, JSON.stringify({
          count,
          importedAt: new Date().toISOString()
        }));
        return count;
      } catch(e) {
        console.error('[Readings DB] Parse error:', e);
        return 0;
      }
    };
    
    // Get all known readings for a single kanji character
    const getKanjiReadings = (kanjiChar) => {
      const db = getReadingsDB();
      if (!db) return null;
      return db[kanjiChar] || null;
    };

    // ============================================
    // MOCK DATA & WORD STORAGE
    // ============================================

    // Word Store - manages captured words with localStorage persistence
    const WordStore = {
      STORAGE_KEY: 'wordHunter_capturedWords',
      
      // Load from localStorage
      load: () => {
        try {
          const stored = localStorage.getItem(WordStore.STORAGE_KEY);
          return stored ? JSON.parse(stored) : {};
        } catch (e) {
          console.error('Failed to load word store:', e);
          return {};
        }
      },
      
      // Save to localStorage
      save: (words) => {
        try {
          localStorage.setItem(WordStore.STORAGE_KEY, JSON.stringify(words));
        } catch (e) {
          console.error('Failed to save word store:', e);
        }
      },
      
      // Generate rubyParts from kanji string + hiragana reading
      // Uses kana characters as anchors, then splits consecutive kanji runs
      // using the kanji readings dictionary for accurate per-character assignment
      generateRubyParts: (kanji, hiragana) => {
        if (!kanji || !hiragana) return [];
        try {
        const isKanji = (c) => /[\u4e00-\u9faf\u3400-\u4dbf]/.test(c);
        const isKana = (c) => /[\u3040-\u309f\u30a0-\u30ff]/.test(c);
        const toHiragana = c => c.charCodeAt(0) >= 0x30A0 && c.charCodeAt(0) <= 0x30FF ? String.fromCharCode(c.charCodeAt(0) - 0x60) : c;
        
        const chars = [...kanji];
        const rc = [...hiragana];
        
        // If word is entirely kana, no ruby needed
        if (chars.every(c => isKana(c))) {
          return chars.map(c => ({ base: c }));
        }
        
        // Split word into runs of kanji vs kana
        const segments = [];
        let cur = { chars: '', type: null };
        for (const ch of chars) {
          const type = isKanji(ch) ? 'kanji' : 'kana';
          if (type !== cur.type && cur.chars) { segments.push({ ...cur }); cur = { chars: '', type: null }; }
          cur.chars += ch; cur.type = type;
        }
        if (cur.chars) segments.push(cur);
        
        // Walk segments and reading in parallel, using kana as anchors
        let ri = 0;
        const parts = [];
        
        for (let si = 0; si < segments.length; si++) {
          const seg = segments[si];
          if (seg.type === 'kana') {
            const sc = [...seg.chars];
            for (const ch of sc) {
              parts.push({ base: ch });
            }
            ri += sc.length;
          } else {
            // Kanji segment: find where the next kana anchor starts in the reading
            const nextKanaSeg = segments.slice(si + 1).find(s => s.type === 'kana');
            let readingEnd;
            
            if (nextKanaSeg) {
              const anchor = toHiragana([...nextKanaSeg.chars][0]);
              // Start searching after at least 1 reading char per kanji in this segment
              const minReading = [...seg.chars].length;
              readingEnd = ri + minReading;
              while (readingEnd < rc.length && toHiragana(rc[readingEnd]) !== anchor) readingEnd++;
            } else {
              readingEnd = rc.length;
            }
            
            const kanjiChars = [...seg.chars];
            const readingSlice = rc.slice(ri, readingEnd).join('');
            
            if (kanjiChars.length === 1) {
              parts.push({ base: kanjiChars[0], ruby: readingSlice });
            } else {
              // Multiple consecutive kanji — use readings dictionary to split
              const split = WordStore.splitKanjiReading(kanjiChars, readingSlice);
              parts.push(...split);
            }
            ri = readingEnd;
          }
        }
        
        return parts;
        } catch(e) {
          console.error('[generateRubyParts] Error for', kanji, hiragana, e);
          return [];
        }
      },
      // e.g. ["連","続","最","適","化"], "れんぞくさいてきか"
      //   → [{base:"連",ruby:"れん"}, {base:"続",ruby:"ぞく"}, ...]
      // Uses backtracking: try each kanji's known readings, see if they match
      // the start of the remaining hiragana, and recurse.
      splitKanjiReading: (kanjiChars, reading) => {
        const db = getReadingsDB();
        
        // Recursive solver with memoization
        const solve = (ki, ri) => {
          // Base case: consumed all kanji
          if (ki === kanjiChars.length) {
            return ri === reading.length ? [] : null; // must also consume all reading
          }
          // No reading left but kanji remain
          if (ri >= reading.length) return null;
          
          const kanjiChar = kanjiChars[ki];
          const remaining = reading.slice(ri);
          
          // Get known readings from dictionary
          const knownReadings = db ? db[kanjiChar] : null;
          
          if (knownReadings) {
            // Sort by length descending to prefer longer matches first
            const sorted = [...knownReadings].sort((a, b) => b.length - a.length);
            for (const r of sorted) {
              if (remaining.startsWith(r)) {
                const rest = solve(ki + 1, ri + r.length);
                if (rest !== null) {
                  return [{ base: kanjiChar, ruby: r }, ...rest];
                }
              }
            }
          }
          
          // Dictionary miss or no match: if last kanji, take all remaining reading
          if (ki === kanjiChars.length - 1) {
            return [{ base: kanjiChar, ruby: remaining }];
          }
          
          // Try brute-force: prefer 2 chars (typical on'yomi), then 1, 3, 4
          for (const len of [2, 1, 3, 4]) {
            if (len > remaining.length) continue;
            const tryReading = remaining.slice(0, len);
            const rest = solve(ki + 1, ri + len);
            if (rest !== null) {
              return [{ base: kanjiChar, ruby: tryReading }, ...rest];
            }
          }
          
          return null; // no valid split found
        };
        
        const result = solve(0, 0);
        if (result) return result;
        
        // Ultimate fallback: emit as single group
        return [{ base: kanjiChars.join(''), ruby: reading }];
      },
      
      // Ensure word data has all required fields with safe defaults
      normalize: (data) => {
        if (!data) return data;
        
        // Always generate rubyParts from kanji + hiragana (more accurate than API)
        const rubyParts = (data.kanji && data.hiragana)
          ? WordStore.generateRubyParts(data.kanji, data.hiragana)
          : [];
        // rubyParts generated from kanji + hiragana
        
        // Retroactively look up Kanjium pitch for old words that used AI pitch
        let pitchAccent = data.pitchAccent || [];
        let pitchSource = data.pitchSource || null;
        if (pitchSource !== 'kanjium' && data.kanji && data.hiragana) {
          const kanjiumPitch = lookupPitchAccent(data.kanji, data.hiragana);
          if (kanjiumPitch) {
            pitchAccent = kanjiumPitch;
            pitchSource = 'kanjium';
          }
        }
        
        // Sanitize AI pitchAccent: merge incorrectly split compound morae
        // e.g. し,ょ,う → しょ,う  (small kana should merge with preceding consonant)
        if (pitchAccent.length > 0) {
          const smallKana = /^[ゃゅょャュョァィゥェォ]$/;
          const fixed = [];
          for (let i = 0; i < pitchAccent.length; i++) {
            const next = pitchAccent[i + 1];
            if (next && smallKana.test(next.kana)) {
              // Merge: take current's pitch, combine kana and romaji
              fixed.push({
                kana: pitchAccent[i].kana + next.kana,
                pitch: pitchAccent[i].pitch,
                romaji: moraToRomaji(pitchAccent[i].kana + next.kana) || (pitchAccent[i].romaji + next.romaji)
              });
              i++; // skip next
            } else {
              fixed.push(pitchAccent[i]);
            }
          }
          pitchAccent = fixed;
        }
        
        return {
          kanji: data.kanji || '?',
          hiragana: data.hiragana || '',
          romaji: data.romaji || '—',
          english: data.english || '',
          partOfSpeech: data.partOfSpeech || 'unknown',
          definition: data.definition || (data.definitions && data.definitions[0] ? data.definitions[0].definition : ''),
          definitions: data.definitions || (data.definition ? [{ rank: 'primary', frequency: 'common', meaning: data.english || '', definition: data.definition }] : []),
          jlpt: lookupJlptLevel(data.kanji, data.hiragana) || data.jlpt || '?',
          rubyParts: rubyParts || [],
          contextUsage: data.contextUsage || { daily: 0, media: 0, business: 0, academic: 0 },
          pitchAccent,
          pitchSource,
          sentences: data.sentences || [],
          kanjiDetails: data.kanjiDetails || [],
          capturedAt: data.capturedAt || new Date().toISOString(),
          isPlaceholder: data.isPlaceholder || false,
          isPartial: data.isPartial || false,
          fetchedAt: data.fetchedAt || null
        };
      },
      
      // Get a word (from dictionary, then store, then create placeholder)
      get: (word, store) => {
        // First check dictionary
        if (dictionaryData[word]) {
          return { data: WordStore.normalize(dictionaryData[word]), source: 'dictionary' };
        }
        // Then check stored words
        if (store[word]) {
          return { data: WordStore.normalize(store[word]), source: 'stored' };
        }
        // Return null to signal we need to fetch/create
        return { data: null, source: 'new' };
      },
      
      // Fetch word data progressively: core first, extended in background
      fetchOrCreateWord: async (word, apiKey, onCoreReady, sourceContext) => {
        console.log(`[WordStore] fetchOrCreateWord("${word}")${sourceContext ? ' from: ' + sourceContext : ''}, API key: ${apiKey ? 'YES (' + apiKey.substring(0, 10) + '...)' : 'MISSING'}`);
        
        if (!apiKey) {
          console.warn('[WordStore] No API key — falling back to placeholder');
          return WordStore.createPlaceholder(word);
        }
        
        // Try Phase 1: core data (kanji, reading, definition)
        console.log('[WordStore] Phase 1: fetching core data...');
        const coreData = await fetchCoreData(word, apiKey, sourceContext);
        console.log('[WordStore] Phase 1 result:', coreData ? 'SUCCESS' : 'FAILED');
        
        if (coreData) {
          // Try Kanjium pitch accent lookup (instant, authoritative)
          const kanjiumPitch = lookupPitchAccent(coreData.kanji || word, coreData.hiragana || '');
          if (kanjiumPitch) console.log('[WordStore] Kanjium pitch found:', coreData.kanji);
          
          // Build partial word with placeholder extended data
          const partialWord = {
            ...coreData,
            contextUsage: coreData.contextUsage || { daily: 1, media: 1, business: 0, academic: 0 },
            pitchAccent: kanjiumPitch || [],
            pitchSource: kanjiumPitch ? 'kanjium' : null,
            sentences: [],
            kanjiDetails: [],
            fetchedAt: new Date().toISOString(),
            isPlaceholder: false,
            isPartial: true
          };
          
          // Deliver core data immediately (with Kanjium pitch if available!)
          if (onCoreReady) onCoreReady(WordStore.normalize(partialWord));
          
          // Phase 2: fetch extended data in background
          // Skip pitch in Claude call if Kanjium already has it
          console.log('[WordStore] Phase 2: fetching extended data...' + (kanjiumPitch ? ' (skipping pitch — Kanjium has it)' : ''));
          const japaneseWord = coreData.kanji || word;
          const extData = await fetchExtendedData(japaneseWord, apiKey, !!kanjiumPitch, coreData.jlpt, coreData.definitions || []);
          console.log('[WordStore] Phase 2 result:', extData ? 'SUCCESS' : 'FAILED');
          
          if (extData) {
            // Kanjium pitch takes priority over Claude's pitch data
            const finalPitch = kanjiumPitch || extData.pitchAccent || partialWord.pitchAccent;
            const finalPitchSource = kanjiumPitch ? 'kanjium' : (extData.pitchAccent ? 'ai' : null);
            
            return WordStore.normalize({
              ...partialWord,
              pitchAccent: finalPitch,
              pitchSource: finalPitchSource,
              sentences: extData.sentences || partialWord.sentences,
              kanjiDetails: extData.kanjiDetails || partialWord.kanjiDetails,
              isPartial: false
            });
          }
          return WordStore.normalize({ ...partialWord, isPartial: false });
        }
        // Fall back to placeholder
        console.warn('[WordStore] Both phases failed — using placeholder');
        return WordStore.createPlaceholder(word);
      },
      
      // Create placeholder for unknown word
      createPlaceholder: (capturedWord) => {
        const chars = capturedWord.split('').filter(c => c.match(/[\u4e00-\u9faf]/));

        const kanjiDetails = chars.length > 0 
          ? chars.map(c => ({
              kanji: c,

              strokeCount: Math.floor(Math.random() * 10) + 5
            }))
          : [{
              kanji: capturedWord[0] || '?',
              meaning: 'Meaning not yet loaded',
              strokeCount: 1
            }];
        
        const pitchAccent = capturedWord.split('').map((c, i) => ({
          kana: c,
          pitch: i === 0 ? 0 : 1,
          romaji: '—'
        }));
        
        // Create placeholder sentences using the captured word
        const sentences = [
          { 
            id: 1, 
            parts: [
              { text: capturedWord, highlight: true },
              { text: 'を使います。' }
            ], 
            english: `Using "${capturedWord}".`
          },
          { 
            id: 2, 
            parts: [
              { text: 'これは' },
              { text: capturedWord, highlight: true },
              { text: 'です。' }
            ], 
            english: `This is "${capturedWord}".`
          },
          { 
            id: 3, 
            parts: [
              { text: capturedWord, highlight: true },
              { text: 'の意味は？' }
            ], 
            english: `What does "${capturedWord}" mean?`
          }
        ];
        
        return {
          kanji: capturedWord,
          hiragana: capturedWord,
          romaji: '—',
          english: 'Translation pending...',
          definition: `"${capturedWord}" — This word was captured but full dictionary data hasn't been loaded yet. In the full app, this would be fetched from a Japanese dictionary API.`,

          kanjiDetails: kanjiDetails,
          capturedAt: new Date().toISOString(),
          isPlaceholder: true
        };
      },

      addWord: (word, data, store) => {
        const newStore = { ...store, [word]: { ...data, capturedAt: data.capturedAt || new Date().toISOString() } };
        WordStore.save(newStore);
        return newStore;
      },
      
      // Get all captured words
      getAllWords: (store) => {
        return Object.keys(store).map(key => ({
          word: key,
          ...store[key]

    const ExamplesTab = ({ word }) => {
      const sentences = word.sentences || [];

      if (sentences.length === 0) {
        return (
          <div style={{ textAlign: 'center', padding: '40px 0', color: '#999' }}>
            <p style={{ fontSize: '14px', fontWeight: '600' }}>No examples available yet</p>
            <p style={{ fontSize: '12px', marginTop: '8px' }}>Examples may still be loading</p>
          </div>
        );
      }
      
      // Build one group per definition by matching sentences via defMeaning
      const groups = [];
      if (defs.length > 1) {
        const used = new Set();
        // First pass: exact match on defMeaning to definition meaning
        defs.forEach((d) => {
          const matching = [];
          sentences.forEach((s, si) => {
            if (used.has(si) || !s.defMeaning) return;
            const dm = s.defMeaning.toLowerCase().trim();
            const defM = d.meaning.toLowerCase().trim();
            // Exact match or one contains the other
            if (dm === defM || dm.includes(defM) || defM.includes(dm)) {
              matching.push(s);
              used.add(si);
            }
          });
          groups.push({ def: d, sentences: matching });
        });
        // Second pass: keyword match for any still unmatched
        sentences.forEach((s, si) => {
          if (used.has(si) || !s.defMeaning) return;
          const dm = s.defMeaning.toLowerCase();
          for (let g = 0; g < groups.length; g++) {
            const keywords = groups[g].def.meaning.toLowerCase().split(/[\s\/,]+/).filter(w => w.length > 2);
            if (keywords.some(kw => dm.includes(kw))) {
              groups[g].sentences.push(s);
              used.add(si);
              break;
            }
          }
        });
        // Third pass: distribute any remaining unmatched round-robin
        const unmatched = sentences.filter((_, si) => !used.has(si));
        unmatched.forEach((s, i) => {
          const emptyGroup = groups.find(g => g.sentences.length === 0);
          if (emptyGroup) {
            emptyGroup.sentences.push(s);
          } else {
            groups[i % groups.length].sentences.push(s);

    const PitchVisual = ({ pitchAccent, activeMora = -1 }) => {

    const HearTab = ({ word, googleTTSKey }) => {
      const [isPlaying, setIsPlaying] = useState(null);
      const [activeMora, setActiveMora] = useState(-1);
      const animFrameRef = useRef(null);
      
      const handlePlay = async (speed) => {
        if (isPlaying) return;
        setIsPlaying(speed);
        const rate = speed === 'superslow' ? 0.45 : speed === 'slow' ? 0.7 : 1.0;
        
        // Try Google TTS — returns audio element
        if (googleTTSKey) {
          const audio = await playGoogleTTS(word.kanji, googleTTSKey, rate, word.hiragana);
          if (audio) {
            // Wait for duration metadata
            await new Promise(resolve => {
              if (audio.duration && audio.duration !== Infinity) resolve();
              else audio.addEventListener('loadedmetadata', resolve, { once: true });
            });
            
            const duration = audio.duration;
            const timings = word.pitchAccent ? getMoraTimings(word.pitchAccent, duration) : [];
            
            audio.play();
            const startTime = performance.now();
            
            if (timings.length > 0) {
              const animate = () => {
                const elapsed = (performance.now() - startTime) / 1000;
                let current = -1;
                for (let i = 0; i < timings.length; i++) {
                  if (elapsed >= timings[i].start && elapsed < timings[i].start + timings[i].duration) {
                    current = i;
                    break;
                  }
                }
                setActiveMora(current);
                if (elapsed < duration) {
                  animFrameRef.current = requestAnimationFrame(animate);
                }
              };
              animFrameRef.current = requestAnimationFrame(animate);
            }
            
            audio.onended = () => {
              if (animFrameRef.current) cancelAnimationFrame(animFrameRef.current);
              setActiveMora(-1);
              setIsPlaying(null);
            };
            audio.onerror = () => {
              if (animFrameRef.current) cancelAnimationFrame(animFrameRef.current);
              setActiveMora(-1);
              setIsPlaying(null);
            };
            return;
          }
          console.warn('[HearTab] Google TTS failed, falling back to browser');
        }
        
        // Fallback: browser SpeechSynthesis (no pitch animation)
        const utterance = new SpeechSynthesisUtterance(word.hiragana || word.kanji);
        utterance.lang = 'ja-JP';
        utterance.rate = speed === 'superslow' ? 0.3 : speed === 'slow' ? 0.5 : 1.0;
        utterance.onend = () => setIsPlaying(null);
        utterance.onerror = () => setIsPlaying(null);
        speechSynthesis.speak(utterance);
      };
      
      useEffect(() => () => { if (animFrameRef.current) cancelAnimationFrame(animFrameRef.current); }, []);
      
      // Detect pitch pattern from data
      const detectPitchPattern = (pitchAccent) => {
        if (!pitchAccent || pitchAccent.length < 2) return { name: 'unknown', japanese: '不明', description: 'Pitch pattern could not be determined.' };
        const pitches = pitchAccent.map(p => p.pitch);
        const n = pitches.length;
        
        let dropAfter = -1;
        for (let i = 0; i < n - 1; i++) {
          if (pitches[i] === 1 && pitches[i + 1] === 0) { dropAfter = i; break; }
        }
        
        if (dropAfter === 0) {
          return { name: 'atamadaka', japanese: '頭高型', description: 'Starts high on the first mora, then drops and stays low. Emphasize the very first beat.' };
        }
        if (dropAfter === -1) {
          if (pitches[0] === 0) {
            return { name: 'heiban', japanese: '平板型', description: 'Starts low, rises after the first mora, and stays high — even when followed by a particle. Flat and even.' };
          }
          return { name: 'heiban', japanese: '平板型', description: 'Stays at a consistent pitch throughout.' };
        }
        if (dropAfter === n - 2) {
          if (pitches[0] === 0) {
            return { name: 'odaka', japanese: '尾高型', description: 'Starts low, rises, and stays high through the last mora — but drops when followed by a particle like は or が.' };
          }
        }
        if (dropAfter >= 1) {
          return { name: 'nakadaka', japanese: '中高型', description: `Starts low, rises, then drops after mora ${dropAfter + 1}. The pitch peaks in the middle of the word.` };
        }
        return { name: 'unknown', japanese: '不明', description: 'Pitch pattern could not be classified.' };
      };
      
      const pattern = detectPitchPattern(word.pitchAccent);
      
      return (
        <div style={{ display: 'flex', flexDirection: 'column', gap: '24px' }}>

              );
              return (
              <button key={speed} onClick={() => handlePlay(speed)}

                animation: active ? 'breathe 1.5s ease-in-out infinite' : 'none',
              }}>
                {icon}
                {label}
              </button>
              );
            })}

    // ============================================

    // Tip state helpers

    function setTipsEnabled(v) { localStorage.setItem(TIP_KEYS.tipsEnabled, String(v)); }

    // ============================================
    // CAPTURE PAGE
    // ============================================
    
    const CapturePage = ({ onCapture, defaultLang, apiKey, googleTTSKey }) => {
      const speechMethod = getSpeechMethod(googleTTSKey);
      
      const [status, setStatus] = useState(() => speechMethod !== 'manual' ? 'listening' : 'manual');

      const [candidates, setCandidates] = useState([]);
      const [editValue, setEditValue] = useState('');
      const [alternatives, setAlternatives] = useState([]);
      const [editReading, setEditReading] = useState('');
      const [showTipModal, setShowTipModal] = useState(false);
      const [debugLog, setDebugLog] = useState([]);
      const [showDebugLog, setShowDebugLog] = useState(false);
      const recStartTimeRef = useRef(0);
      const hadInterimRef = useRef(false);
      
      const capLog = useCallback((msg, level = 'info') => {
        const elapsed = recStartTimeRef.current ? Date.now() - recStartTimeRef.current : 0;
        const ts = recStartTimeRef.current ? `${elapsed}ms` : '—';
        const entry = { ts, msg, level, time: new Date().toLocaleTimeString('en-US', { hour12: false, hour: '2-digit', minute: '2-digit', second: '2-digit' }) };
        setDebugLog(prev => [...prev.slice(-30), entry]);
        console.log(`[CAP ${ts}] ${msg}`);
      }, []);
      
      // Tip tracking refs (persist across re-renders, not in state to avoid re-render loops)
      const gotFinalRef = useRef(false);
      const lastInterimRef = useRef('');
      const [listeningReady, setListeningReady] = useState(false);      
      const handleTipDismiss = useCallback(() => { setShowTipModal(false); }, []);
      
      // Mini dictionary for confirmation page definitions
      const miniDict = useRef({
        '木': 'tree', '目': 'eye', '手': 'hand', '日': 'day', '火': 'fire', '水': 'water',

    const App = () => {
      console.log('[Kanji Hunt] v2.36.0 loaded');
      const [activeSection, setActiveSection] = useState('capture');
      const [captureResetKey, setCaptureResetKey] = useState(0);
      const [capturedWord, setCapturedWord] = useState(null);
      const [wordData, setWordData] = useState(null);
      const [wordStore, setWordStore] = useState(() => WordStore.load());
      const [isLoading, setIsLoading] = useState(false);
      const [apiKey, setApiKey] = useState(() => getStoredAPIKey());
      const [defaultLang, setDefaultLang] = useState(() => getStoredDefaultLang());
      const [googleTTSKey, setGoogleTTSKey] = useState(() => getStoredGoogleTTSKey());
      const [showSettings, setShowSettings] = useState(false);
      const [showAdmin, setShowAdmin] = useState(false);
      const [pinnedWords, setPinnedWords] = useState(() => {
        try { return new Set(JSON.parse(localStorage.getItem('wordHunter_pinnedWords') || '[]')); }
        catch { return new Set(); }
      });
      
      const togglePin = (word) => {
        setPinnedWords(prev => {
          const next = new Set(prev);
          if (next.has(word)) next.delete(word); else next.add(word);
          localStorage.setItem('wordHunter_pinnedWords', JSON.stringify([...next]));
          return next;
        });
      };
      
      const handleSaveKey = (key) => {
        setApiKey(key);
        setStoredAPIKey(key);
      };
      
      const handleSaveDefaultLang = (lang) => {
        setDefaultLang(lang);
        setStoredDefaultLang(lang);
      };
      
      const handleSaveGoogleTTSKey = (key) => {
        setGoogleTTSKey(key);
        setStoredGoogleTTSKey(key);
      };
      
      const handleCapture = async (word, sourceContext) => {
        // Normalize: trim, strip trailing punctuation, and remove internal spaces from Japanese
        word = word.trim().replace(/[。．.、,\s]+$/, '');
        // Japanese words never have internal spaces — strip any inserted by speech API or Claude
        const hasJapanese = /[\u3040-\u309f\u30a0-\u30ff\u4e00-\u9faf]/.test(word);
        if (hasJapanese) word = word.replace(/\s+/g, '');
        
        console.log('[handleCapture] Word: "' + word + '"' + (sourceContext ? ' (from: ' + sourceContext + ')' : ''));
        setCapturedWord(word);
        setActiveSection('view');
        
        // Get word data (from dictionary or store)
        const { data, source } = WordStore.get(word, wordStore);
        
        if (data) {
          // Found in dictionary or store — update timestamp so it bubbles to top
          setWordData(data);
          const updatedData = { ...data, capturedAt: new Date().toISOString() };
          const newStore = WordStore.addWord(word, updatedData, wordStore);
          setWordStore(newStore);
          console.log(`Word "${word}" loaded from ${source} (timestamp updated)`);
        } else {
          // New word - fetch progressively
          setIsLoading(true);
          console.log(`Fetching data for "${word}"...`);
          
          const fullData = await WordStore.fetchOrCreateWord(word, apiKey, (partialWord) => {
            // Core data ready — show the card immediately
            setWordData(partialWord);
            setIsLoading(false);
            console.log(`Core data for "${word}" ready — showing card`);
          }, sourceContext);
          
          // Extended data ready — update the card seamlessly
          setWordData(fullData);
          setIsLoading(false);
          
          // Save to store
          const newStore = WordStore.addWord(word, fullData, wordStore);
          setWordStore(newStore);
          
          console.log(`Word "${word}" fully loaded`);
        }
      };
      
      const handleNewCapture = () => {
        setCapturedWord(null);
        setWordData(null);
        setActiveSection('capture');
      };
      
      const handleDeleteUnpinned = () => {
        const newStore = {};
        Object.keys(wordStore).forEach(key => {
          if (pinnedWords.has(key)) {
            newStore[key] = wordStore[key];
          }
        });
        setWordStore(newStore);
        WordStore.save(newStore);
      };
      
      const handleSelectFromHistory = (word) => {
        // Load the word data from store or dictionary
        const { data } = WordStore.get(word, wordStore);
        if (data) {
          setCapturedWord(word);
          setWordData(data);
          setActiveSection('view');
        }
      };
      
      // Debug: log store contents
      useEffect(() => {
        console.log('Word Store:', wordStore);
        console.log('Stored words:', Object.keys(wordStore));
        console.log('API Key configured:', !!apiKey);
      }, [wordStore, apiKey]);
      
      return (
        <div style={{ maxWidth: '430px', margin: '0 auto', minHeight: '100vh', background: '#fff', position: 'relative' }}>
          <div style={{ position: 'absolute', top: '2px', left: '4px', fontSize: '9px', color: '#ffe600', zIndex: 100, userSelect: 'text', fontFamily: 'monospace' }}>v2.36.0</div>
          {/* Settings & Admin buttons */}
          <div style={{ position: 'fixed', top: '16px', right: '16px', zIndex: 50, display: 'flex', gap: '8px' }}>
            <button
              onClick={() => setShowAdmin(true)}
              style={{
                width: '40px', height: '40px', borderRadius: '50%',
                background: apiKey ? '#4ade80' : '#ffe600',
                border: '2px solid #000', cursor: 'pointer',
                display: 'flex', alignItems: 'center', justifyContent: 'center',
                fontSize: '18px', boxShadow: '2px 2px 0 #000'
              }}
              title={apiKey ? 'API key configured' : 'Add API key'}
            >
              🔑
            </button>
            <button
              onClick={() => setShowSettings(true)}
              style={{
                width: '40px', height: '40px', borderRadius: '50%',
                background: '#f5f5f5',
                border: '2px solid #000', cursor: 'pointer',
                display: 'flex', alignItems: 'center', justifyContent: 'center',
                fontSize: '18px', boxShadow: '2px 2px 0 #000'
              }}
              title="Settings"
            >
              ⚙️
            </button>
          </div>
          
          {/* Settings modal */}
          {showSettings && (
            <SettingsPage
              defaultLang={defaultLang}
              onSaveDefaultLang={handleSaveDefaultLang}
              onClose={() => setShowSettings(false)}
            />
          )}
          
          {/* Admin modal */}
          {showAdmin && (
            <AdminPage
              apiKey={apiKey}
              onSaveKey={handleSaveKey}
              googleTTSKey={googleTTSKey}
              onSaveGoogleTTSKey={handleSaveGoogleTTSKey}
              onClose={() => setShowAdmin(false)}
              wordStore={wordStore}
              pinnedWords={pinnedWords}
              onDeleteUnpinned={handleDeleteUnpinned}
            />
          )}
          
          {activeSection === 'capture' && <CapturePage key={captureResetKey} onCapture={handleCapture} defaultLang={defaultLang} apiKey={apiKey} googleTTSKey={googleTTSKey} />}
          {activeSection === 'history' && <HistoryPage wordStore={wordStore} onSelectWord={handleSelectFromHistory} pinnedWords={pinnedWords} onTogglePin={togglePin} />}
          {activeSection === 'view' && (wordData || isLoading) && <ViewPage word={wordData} onNewCapture={handleNewCapture} onCaptureKanji={handleCapture} isLoading={isLoading} apiKey={apiKey} onRetry={() => capturedWord && handleCapture(capturedWord)} googleTTSKey={googleTTSKey} isPinned={wordData && pinnedWords.has(wordData.kanji)} onTogglePin={togglePin} />}
          {activeSection === 'view' && !wordData && !isLoading && (
            <div style={{ padding: '24px', paddingBottom: '100px', minHeight: '100vh', background: '#fff', display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
              <div style={{ textAlign: 'center', color: '#888' }}>
                <span style={{ fontSize: '48px' }}>📖</span>
                <p style={{ marginTop: '16px', fontWeight: '600' }}>No word captured yet</p>
                <button onClick={handleNewCapture} style={{ marginTop: '16px', background: '#ffe600', border: '3px solid #000', borderRadius: '12px', padding: '12px 24px', fontWeight: '700', cursor: 'pointer' }}>Capture a word</button>
              </div>
            </div>
          )}
          {activeSection === 'practice' && (
            <div style={{ padding: '24px', paddingBottom: '100px', minHeight: '100vh', background: '#fff', display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
              <div style={{ textAlign: 'center', color: '#888' }}><span style={{ fontSize: '48px' }}>⚔️</span><p style={{ marginTop: '16px', fontWeight: '600' }}>Practice coming soon</p></div>
            </div>
          )}
          {activeSection === 'collection' && (
            <div style={{ padding: '24px', paddingBottom: '100px', minHeight: '100vh', background: '#fff', display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
              <div style={{ textAlign: 'center', color: '#888' }}><span style={{ fontSize: '48px' }}>📚</span><p style={{ marginTop: '16px', fontWeight: '600' }}>Collection coming soon</p></div>
            </div>
          )}
          <BottomNav activeSection={activeSection} onSectionChange={(id) => {
            if (id === 'capture') setCaptureResetKey(k => k + 1);
            setActiveSection(id);
          }} />
        </div>
      );
    };
    
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
