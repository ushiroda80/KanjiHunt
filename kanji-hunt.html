    // Determine best available speech input method
    function getSpeechMethod() {
      var user = firebaseAuth.currentUser;
      var isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) || 
        (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);
      if (isIOS) return (typeof MediaRecorder !== 'undefined' && !!user) ? 'cloudSTT' : 'manual';

      return 'manual';

    // STT Worker code — does b64 encode + Cloud Function fetch off main thread
    // Auth token passed in via postMessage (short-lived, standard pattern)
    var sttWorkerCode = 'self.onmessage=async function(e){var t0=Date.now(),d=e.data,cb=d.chunkBuffers,token=d.authToken,cfUrl=d.cfUrl,ln=d.lang,mt=d.mimeType;try{var tl=0;for(var i=0;i<cb.length;i++)tl+=cb[i].byteLength;var m=new Uint8Array(tl),o=0;for(var i=0;i<cb.length;i++){m.set(new Uint8Array(cb[i]),o);o+=cb[i].byteLength}var C=8192,b="";for(var i=0;i<m.length;i+=C)b+=String.fromCharCode.apply(null,m.subarray(i,i+C));var b64=btoa(b),b64Ms=Date.now()-t0;var ft0=Date.now(),r=await fetch(cfUrl,{method:"POST",headers:{"Content-Type":"application/json","Authorization":"Bearer "+token},body:JSON.stringify({audioBase64:b64,lang:ln,mimeType:mt})});if(!r.ok){self.postMessage({error:"stt-api-error"});return}var data=await r.json(),fMs=Date.now()-ft0,tMs=Date.now()-t0;var tr=data.transcript||"",al=data.alternatives||[],co=data.confidence||0;self.postMessage({ok:true,transcript:tr,alternatives:al,confidence:co,b64Ms:b64Ms,fetchMs:fMs,totalMs:tMs})}catch(err){self.postMessage({error:"stt-network-error"})}};';
    var sttWorkerUrl = URL.createObjectURL(new Blob([sttWorkerCode], { type: 'application/javascript' }));
    
    // Google Cloud Speech-to-Text via Worker + Cloud Function
    function recognizeWithCloudSTT(lang) {
      lang = lang || 'ja-JP';
      var SPEECH_THRESH = 4, SILENCE_THRESH = 2, SILENCE_MS = 650, MIN_SPEECH_MS = 200;
      var MAX_MS = 5500, SMOOTHING = 0.1, FFT = 512, METER_SCALE = 8;
      var recording = false, cancelled = false, stream = null, recorder = null, audioCtx = null, analyser = null;
      var rafId = null, chunks = [], speechDetected = false, speechT0 = 0, silenceT0 = 0, captureT0 = 0, stopTimer = null;
      var ctrl = { stop: null, cancel: null, updateMeter: null, log: null };
      var logMsg = function(msg) { if (ctrl.log) ctrl.log(msg); };
      var stopRecording = function(reason) {
        if (!recording) return;
        logMsg('⏹ Stop: ' + reason);
        recording = false;
        clearTimeout(stopTimer);
        if (rafId) cancelAnimationFrame(rafId);
        if (recorder && recorder.state !== 'inactive') recorder.stop();
      };
      var monitorLoop = function() {
        var buf = new Uint8Array(analyser.frequencyBinCount);
        function tick() {
          if (!recording) return;
          analyser.getByteTimeDomainData(buf);
          var sum = 0;
          for (var i = 0; i < buf.length; i++) { var v = buf[i] - 128; sum += v * v; }
          var rms = Math.sqrt(sum / buf.length);
          var now = Date.now();
          var elapsed = now - captureT0;
          if (ctrl.updateMeter) ctrl.updateMeter(Math.min(100, rms * METER_SCALE), speechDetected ? (rms < SILENCE_THRESH ? '#ff3366' : '#ffe600') : 'rgba(255,255,255,0.15)');
          if (!speechDetected) {
            if (rms > SPEECH_THRESH) { speechDetected = true; speechT0 = now; silenceT0 = 0; logMsg('🗣 Speech at ' + elapsed + 'ms (RMS: ' + rms.toFixed(1) + ')'); }
          } else {
            if (rms < SILENCE_THRESH) {
              if (!silenceT0) { silenceT0 = now; logMsg('🤫 Silence at ' + elapsed + 'ms (RMS: ' + rms.toFixed(1) + ')'); }
              var speechDur = (silenceT0 || now) - speechT0, silDur = now - silenceT0;
              if (silenceT0 && silDur >= SILENCE_MS && speechDur >= MIN_SPEECH_MS) { logMsg('✂️ Auto-stop: ' + silDur + 'ms silence, ' + speechDur + 'ms speech'); stopRecording('silence'); return; }
            } else { if (silenceT0) logMsg('🗣 Resumed after ' + (now - silenceT0) + 'ms'); silenceT0 = 0; }
          }
          rafId = requestAnimationFrame(tick);
        }
        tick();
      };
      var promise = new Promise(async function(resolve, reject) {
        var user = firebaseAuth.currentUser;
        if (!user) return reject(new Error('not-signed-in'));
        try { stream = await navigator.mediaDevices.getUserMedia({ audio: true }); } catch (e) { return reject(new Error('mic-denied')); }
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        if (audioCtx.state === 'suspended') await audioCtx.resume();
        logMsg('🔊 AudioCtx: ' + audioCtx.state + ', ' + audioCtx.sampleRate + 'Hz');
        var source = audioCtx.createMediaStreamSource(stream);
        analyser = audioCtx.createAnalyser();
        analyser.fftSize = FFT;
        analyser.smoothingTimeConstant = SMOOTHING;
        source.connect(analyser);
        var mimeType = 'audio/webm';
        var formats = ['audio/webm;codecs=opus', 'audio/webm', 'audio/mp4', 'audio/wav'];
        for (var f = 0; f < formats.length; f++) { if (MediaRecorder.isTypeSupported(formats[f])) { mimeType = formats[f]; break; } }
        recorder = new MediaRecorder(stream, { mimeType: mimeType });
        var chunkBuffers = [];
        var chunkPromises = [];
        // Create Worker at recording start (warm, not stale)
        var worker = new Worker(sttWorkerUrl);
        logMsg('🔧 Worker created at recording start');
        
        recorder.ondataavailable = function(e) {
          if (e.data && e.data.size > 0) {
            var idx = chunks.length;
            chunks.push(e.data);
            chunkPromises.push(e.data.arrayBuffer().then(function(ab) { chunkBuffers[idx] = ab; return ab; }));
          }
        };
        captureT0 = Date.now();
        recorder.onstop = async function() {
          var onstopT0 = Date.now();
          stream.getTracks().forEach(function(t) { t.stop(); });
          cancelAnimationFrame(rafId);
          if (audioCtx) { audioCtx.close(); audioCtx = null; }
          clearTimeout(stopTimer);
          recording = false;
          if (cancelled) { logMsg('↩ onstop: cancelled (user switched to manual)'); worker.terminate(); return; }
          if (chunks.length === 0) { worker.terminate(); return reject(new Error('no-audio')); }
          var recMs = Date.now() - captureT0;
          var totalSize = chunks.reduce(function(s, c) { return s + c.size; }, 0);
          var cleanupMs = Date.now() - onstopT0;
          logMsg('🔴 Stopped. ' + totalSize + 'b, ' + recMs + 'ms, ' + chunks.length + ' chunks, ' + chunkBuffers.filter(Boolean).length + ' pre-converted (cleanup: ' + cleanupMs + 'ms)');
          var pipelineT0 = Date.now();
          try {
            await Promise.all(chunkPromises);
            var abWaitReal = Date.now() - pipelineT0;
            var readyBuffers = chunkBuffers.filter(Boolean);
            logMsg('⏱ AB wait: ' + abWaitReal + 'ms (' + readyBuffers.length + '/' + chunks.length + ' ready)');
            // Get auth token on main thread (needs Firebase SDK), then hand off to Worker
            var token = await getAuthToken();
            var postT0 = Date.now();
            var result = await new Promise(function(res, rej) {
              worker.onmessage = function(e) { res(e.data); worker.terminate(); };
              worker.onerror = function(err) { rej(new Error('worker-error')); worker.terminate(); };
              worker.postMessage({ chunkBuffers: readyBuffers, authToken: token, cfUrl: CF_URLS.recognizeSpeech, lang: lang, mimeType: mimeType }, readyBuffers);
            });
            var pipelineMs = Date.now() - pipelineT0;
            var postMs = Date.now() - postT0;
            if (result.error) { logMsg('❌ Worker: ' + result.error); return reject(new Error(result.error)); }
            logMsg('⏱ Worker: b64=' + result.b64Ms + 'ms, api=' + result.fetchMs + 'ms, total=' + result.totalMs + 'ms | Post: ' + postMs + 'ms | Pipeline: ' + pipelineMs + 'ms');
            resolve({ transcript: result.transcript, alternatives: result.alternatives, confidence: result.confidence, timing: { captureMs: recMs, onstopMs: cleanupMs, packMs: pipelineMs - result.fetchMs, apiMs: result.fetchMs } });
          } catch(e) { logMsg('❌ Pipeline: ' + e.message); reject(new Error('stt-network-error')); }
        };
        recorder.start(1000);
        recording = true;
        logMsg('▶️ Recording');
        stopTimer = setTimeout(function() { if (recording) { logMsg('⏰ Hard cap'); stopRecording('timeout'); } }, MAX_MS);
        monitorLoop();
        ctrl.stop = function() { stopRecording('manual'); };
        ctrl.cancel = function() { cancelled = true; stopRecording('cancelled'); };
      });
      
      promise.ctrl = ctrl;
      return promise;
    }

  <script type="text/babel">
    const { useState, useEffect, useRef, useCallback } = React;
    
    // ============================================
    // API CONFIGURATION
    // ============================================
    
    // Store default capture language preference
    const getStoredDefaultLang = () => localStorage.getItem('wordHunter_defaultLang') || 'ja';
    const setStoredDefaultLang = (lang) => localStorage.setItem('wordHunter_defaultLang', lang);
    
    // ============================================
    // KANJIUM PITCH ACCENT DATABASE
    // ============================================
    // Source: https://github.com/mifunetoshiro/kanjium (CC BY-SA 4.0)
    // Format: TSV with kanji\treading\taccent_number
    // accent_number: 0=heiban (no drop), 1=atamadaka, N=drop after mora N
    
    const PITCH_DB_KEY = 'wordHunter_pitchDB';
    const PITCH_DB_META_KEY = 'wordHunter_pitchDB_meta';
    
    const getPitchDB = () => {
      try {
        const raw = localStorage.getItem(PITCH_DB_KEY);
        return raw ? JSON.parse(raw) : null;
      } catch(e) { return null; }
    };
    
    const getPitchDBMeta = () => {
      try {
        const raw = localStorage.getItem(PITCH_DB_META_KEY);
        return raw ? JSON.parse(raw) : null;
      } catch(e) { return null; }
    };
    
    // Parse Kanjium accents.txt (TSV: kanji\treading\taccent) into a lookup map
    // Key: "kanji:reading" or just "reading" for kana-only words
    // Value: accent number (downstep position)
    const importPitchDB = (tsvText) => {
      const db = {};
      let count = 0;
      const lines = tsvText.split('\n');
      for (const line of lines) {
        const parts = line.split('\t');
        if (parts.length >= 3) {
          const kanji = parts[0].trim();
          const reading = parts[1].trim();
          const accent = parseInt(parts[2].trim(), 10);
          if (kanji && reading && !isNaN(accent)) {
            // Store with kanji key and reading-only key
            db[kanji + ':' + reading] = accent;
            if (!db[reading]) db[reading] = accent; // first reading wins for kana-only lookup
            count++;
          }
        }
      }
      localStorage.setItem(PITCH_DB_KEY, JSON.stringify(db));
      localStorage.setItem(PITCH_DB_META_KEY, JSON.stringify({
        count,
        importedAt: new Date().toISOString()
      }));
      return count;
    };
    
    // Convert downstep position to pitch array [{kana, pitch, romaji}]
    const downstepToPitchArray = (reading, downstep) => {
      // Split reading into morae (not characters)
      const morae = splitIntoMorae(reading);
      const n = morae.length;
      
      return morae.map((mora, i) => {
        let pitch;
        if (downstep === 0) {
          // Heiban: first mora low, rest high
          pitch = i === 0 ? 0 : 1;
        } else if (downstep === 1) {
          // Atamadaka: first mora high, rest low
          pitch = i === 0 ? 1 : 0;
        } else {
          // Nakadaka/Odaka: low, then high, then drops after position downstep
          if (i === 0) pitch = 0;
          else if (i < downstep) pitch = 1;
          else pitch = 0;
        }
        return {
          kana: mora,
          pitch,
          romaji: moraToRomaji(mora)
        };
      });
    };
    
    // Split Japanese text into morae
    const splitIntoMorae = (text) => {
      const morae = [];
      const chars = [...text];
      for (let i = 0; i < chars.length; i++) {
        const c = chars[i];
        const next = chars[i + 1];
        // Check if next char is a small kana (part of compound mora)
        if (next && /[ゃゅょャュョァィゥェォ]/.test(next)) {
          morae.push(c + next);
          i++; // skip next
        } else {
          morae.push(c);
        }
      }
      return morae;
    };
    
    // Basic mora to romaji conversion
    const moraToRomaji = (mora) => {
      const map = {
        'あ':'a','い':'i','う':'u','え':'e','お':'o',
        'か':'ka','き':'ki','く':'ku','け':'ke','こ':'ko',
        'さ':'sa','し':'shi','す':'su','せ':'se','そ':'so',
        'た':'ta','ち':'chi','つ':'tsu','て':'te','と':'to',
        'な':'na','に':'ni','ぬ':'nu','ね':'ne','の':'no',
        'は':'ha','ひ':'hi','ふ':'fu','へ':'he','ほ':'ho',
        'ま':'ma','み':'mi','む':'mu','め':'me','も':'mo',
        'や':'ya','ゆ':'yu','よ':'yo',
        'ら':'ra','り':'ri','る':'ru','れ':'re','ろ':'ro',
        'わ':'wa','を':'wo','ん':'n',
        'が':'ga','ぎ':'gi','ぐ':'gu','げ':'ge','ご':'go',
        'ざ':'za','じ':'ji','ず':'zu','ぜ':'ze','ぞ':'zo',
        'だ':'da','ぢ':'di','づ':'du','で':'de','ど':'do',
        'ば':'ba','び':'bi','ぶ':'bu','べ':'be','ぼ':'bo',
        'ぱ':'pa','ぴ':'pi','ぷ':'pu','ぺ':'pe','ぽ':'po',
        'っ':'Q',
        'きゃ':'kya','きゅ':'kyu','きょ':'kyo',
        'しゃ':'sha','しゅ':'shu','しょ':'sho',
        'ちゃ':'cha','ちゅ':'chu','ちょ':'cho',
        'にゃ':'nya','にゅ':'nyu','にょ':'nyo',
        'ひゃ':'hya','ひゅ':'hyu','ひょ':'hyo',
        'みゃ':'mya','みゅ':'myu','みょ':'myo',
        'りゃ':'rya','りゅ':'ryu','りょ':'ryo',
        'ぎゃ':'gya','ぎゅ':'gyu','ぎょ':'gyo',
        'じゃ':'ja','じゅ':'ju','じょ':'jo',
        'びゃ':'bya','びゅ':'byu','びょ':'byo',
        'ぴゃ':'pya','ぴゅ':'pyu','ぴょ':'pyo'
      };
      return map[mora] || mora;
    };
    
    // Look up pitch accent from Kanjium DB
    // Returns pitch array or null if not found
    const lookupPitchAccent = (kanji, reading) => {
      const db = getPitchDB();
      if (!db) return null;
      
      // Try exact kanji:reading match first
      const key1 = kanji + ':' + reading;
      if (db[key1] !== undefined) {
        return downstepToPitchArray(reading, db[key1]);
      }
      
      // Try reading-only match
      if (db[reading] !== undefined) {
        return downstepToPitchArray(reading, db[reading]);
      }
      
      return null;
    };
    
    // ============================================
    // PROMPT TEMPLATES
    // ============================================
    // All API prompt text lives here. Fetch functions below reference these.
    // Edit prompts here; edit fetch/parse logic in the functions.
    
    const PROMPTS = {
      // Phase 1: Core word data (Sonnet)
      coreData: (word, contextHint) => `I need basic Japanese word data for: "${word}"
${contextHint}
Return ONLY valid JSON (no markdown, no explanation) in this exact format:
{
  "kanji": "${word}",
  "hiragana": "reading in hiragana",
  "romaji": "ro-ma-ji with hyphens between syllables",
  "english": "primary English meaning",
  "definitions": [
    {
      "rank": "primary",
      "frequency": "common",
      "meaning": "short English meaning (2-4 words)",
      "definition": "Super concise two sentence ELI5 definition with usage nuance."
    }
  ],
  "jlpt": "N5/N4/N3/N2/N1",
  "contextUsage": {
    "daily": 0-3,
    "media": 0-3,
    "business": 0-3,
    "academic": 0-3
  }
}

For definitions:
- "rank": "primary" for the most common meaning, "secondary" for the next, "tertiary" for a third.
- "frequency": This is about how common this MEANING is for THIS WORD, not how common the word itself is.
  - "common": this is a standard/expected meaning of the word. If a word has only one meaning, it is ALWAYS "common".
  - "uncommon": a secondary meaning that most learners wouldn't know.
  - "rare": an obscure or literary meaning.
- Include ALL genuinely distinct meanings (up to 3). Many Japanese words have 2-3 distinct meanings that learners need to know.
- Only omit a meaning if it is truly archaic or never used in modern Japanese.
- For example, 控える has 3 distinct meanings: to refrain, to have coming up, and to wait quietly.
For contextUsage: 0 = not appropriate, 1 = acceptable but unusual, 2 = natural fit, 3 = ideal/perfect fit.
Return ONLY the JSON object, nothing else.`,

      // Single kanji context hints (used by coreData)
      singleKanjiWithContext: (sourceContext) =>
        `\nIMPORTANT: This single kanji was encountered in the word "${sourceContext}". For "english", give the most relevant meaning of this kanji as it contributes to "${sourceContext}". For "definition", explain what this kanji means in the context of "${sourceContext}" and other common words that use it. Do NOT give an obscure or archaic meaning.`,
      singleKanjiAlone:
        `\nIMPORTANT: This is a single kanji character. For "english", give its most common and widely-used meaning. For "definition", explain the kanji's core meaning and mention 2-3 common words that use it. Do NOT give obscure or archaic meanings.`,

      // Phase 2a: Pitch accent + example sentences (Sonnet)
      pitchAndSentences: (word, skipPitch, level, defHint) => `I need extended Japanese word data for: "${word}"

Return ONLY valid JSON (no markdown, no explanation) in this exact format:
{${skipPitch ? '' : `
  "pitchAccent": [
    {"kana": "あ", "pitch": 0, "romaji": "a"}
  ],`}
  "sentences": [
    {
      "id": 1,
      "defMeaning": "the English meaning this sentence demonstrates",
      "parts": [
        {"text": "漢字", "reading": "かんじ"},
        {"text": "テキスト"},
        {"text": "${word}", "reading": "reading", "highlight": true}
      ],
      "english": "English translation"
    }
  ]
}
${skipPitch ? '' : `For pitchAccent:
- Break the word into MORAE (not characters). Each mora is one beat: ん counts as its own mora, long vowels like おう are two morae (お and う separately), っ is its own mora, きゃ is ONE mora.
- pitch: 0 = low, 1 = high. Use the standard NHK pitch accent dictionary pattern.
- Include accurate romaji for each mora.
- For example: 天使 (てんし) = [{"kana":"て","pitch":1,"romaji":"te"},{"kana":"ん","pitch":0,"romaji":"n"},{"kana":"し","pitch":0,"romaji":"shi"}]
- For example: 花 (はな) = [{"kana":"は","pitch":0,"romaji":"ha"},{"kana":"な","pitch":1,"romaji":"na"}]`}
For sentences: provide example sentences using ${level}-level grammar and vocabulary, except for the target word "${word}" itself. The surrounding sentence should be easy to understand for a ${level} learner.${defHint}

Return ONLY the JSON object, nothing else.`,

      // Phase 2b: Kanji details (Haiku)
      kanjiDetails: (word) => `List the kanji characters in the Japanese word: "${word}"

Return ONLY valid JSON (no markdown, no explanation):
{"kanjiDetails": [
  {"kanji": "字", "meaning": "meaning of this kanji", "strokeCount": 6}
]}

Include each kanji character in the word with its primary meaning and stroke count. Only include actual kanji characters, not hiragana or katakana.

Return ONLY the JSON object.`,

      // English→Japanese resolution (Haiku)
      resolveEnglish: (englishWord) => `The user spoke the English word "${englishWord}" via speech recognition.

Return a JSON array of Japanese translations. Rules:
- ALWAYS include the literal word "${englishWord}" as the first entry
- ONLY include additional entries if there is a TRUE homophone (identical or near-identical pronunciation in English, e.g. profit/prophet, flower/flour, right/write, bare/bear) OR if the word has genuinely different meanings in Japanese (e.g. "sentence" → 文章 writing/判決 legal verdict)
- Do NOT include words that merely sound vaguely similar or share a root
- For each entry, include a "confidence" score (0-100) representing how likely the user meant this word given speech recognition context
- For each entry, include a "description" field: a brief 3-6 word English clarification that distinguishes this meaning (e.g. "written text or passage", "legal court verdict")

Return ONLY valid JSON (no markdown):
[
  {"english": "word", "kanji": "漢字", "hiragana": "ひらがな", "confidence": 95, "description": "brief clarifying phrase"}
]

Return 1-3 options max. Return ONLY the JSON array.`
    };

    // ============================================
    // API HELPERS — Cloud Function proxy
    // ============================================
    
    const callCloudFunction = async (functionName, params) => {
      const token = await getAuthToken();
      const response = await fetch(CF_URLS[functionName], {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${token}`
        },
        body: JSON.stringify(params)
      });
      if (!response.ok) {
        const errorBody = await response.text();
        throw new Error(`CF ${functionName} error ${response.status}: ${errorBody.slice(0, 200)}`);
      }
      const json = await response.json();
      // Cloud Functions wrap Anthropic results in { result: ... }
      // Unwrap if present, otherwise return raw (e.g. synthesizeSpeech returns { audioContent })
      return json.result !== undefined ? json.result : json;
    };

    // ============================================
    // API FETCH FUNCTIONS
    // ============================================
    
    // Phase 1: Quick fetch — kanji, reading, definition, context (small, fast response)
    const fetchCoreData = async (word, sourceContext) => {
      try {
        console.log('[fetchCoreData] Calling Cloud Function for:', word, sourceContext ? '(from: ' + sourceContext + ')' : '');
        const parsed = await callCloudFunction('fetchCoreData', { word, sourceContext });
        console.log('[fetchCoreData] Parsed result:', parsed);
        return parsed;
      } catch (error) {
        console.error('[fetchCoreData] FAILED:', error.message, error);
        return null;
      }
    };
    
    // Phase 2a: Pitch accent + example sentences
    const fetchPitchAndSentences = async (word, skipPitch = false, jlpt = null, definitions = []) => {
      try {
        return await callCloudFunction('fetchPitchAndSentences', { word, skipPitch, jlpt, definitions });
      } catch (error) {
        console.error('[fetchPitchAndSentences] FAILED:', error);
        return null;
      }
    };

    // Phase 2b: Kanji details
    const fetchKanjiDetails = async (word) => {
      try {
        const parsed = await callCloudFunction('fetchKanjiDetails', { word });
        // Cloud Function returns kanjiDetails array directly (unwrapped from { result: ... })
        return Array.isArray(parsed) ? parsed : (parsed.kanjiDetails || []);
      } catch (error) {
        console.error('[fetchKanjiDetails] FAILED:', error);
        return [];
      }
    };

    // Post-process sentence parts: split mixed kanji+kana chunks so furigana only sits above kanji
    const splitMixedPart = (part) => {
      const { text, reading, highlight } = part;
      if (!reading || !text) return [part];
      
      const isKanji = c => /[\u4e00-\u9faf]/.test(c);
      const isKana = c => /[\u3040-\u309f\u30a0-\u30ff]/.test(c);
      const toHiragana = c => c.charCodeAt(0) >= 0x30A0 && c.charCodeAt(0) <= 0x30FF ? String.fromCharCode(c.charCodeAt(0) - 0x60) : c;
      
      const hasKanjiChar = [...text].some(isKanji);
      const hasKanaChar = [...text].some(isKana);
      if (!hasKanjiChar || !hasKanaChar) return [part];
      
      // Split text into runs of kanji vs kana
      const segments = [];
      let cur = { chars: '', type: null };
      for (const ch of text) {
        const type = isKanji(ch) ? 'kanji' : 'kana';
        if (type !== cur.type && cur.chars) { segments.push({ ...cur }); cur = { chars: '', type: null }; }
        cur.chars += ch; cur.type = type;
      }
      if (cur.chars) segments.push(cur);
      if (segments.length <= 1) return [part];
      
      // Match kana anchors in reading to split out kanji readings
      const rc = [...reading];
      let ri = 0;
      const result = [];
      
      for (let si = 0; si < segments.length; si++) {
        const seg = segments[si];
        if (seg.type === 'kana') {
          const sc = [...seg.chars];
          let ok = true;
          for (let i = 0; i < sc.length; i++) {
            if (!rc[ri + i] || toHiragana(sc[i]) !== toHiragana(rc[ri + i])) { ok = false; break; }
          }
          if (!ok) return [part]; // bail
          ri += sc.length;
          result.push({ text: seg.chars, ...(highlight ? { highlight: true } : {}) });
        } else {
          // Find where next kana anchor starts in reading
          const nextKana = segments[si + 1];
          if (nextKana && nextKana.type === 'kana') {
            const anchor = toHiragana([...nextKana.chars][0]);
            let end = ri;
            while (end < rc.length && toHiragana(rc[end]) !== anchor) end++;
            result.push({ text: seg.chars, reading: rc.slice(ri, end).join(''), ...(highlight ? { highlight: true } : {}) });
            ri = end;
          } else {
            result.push({ text: seg.chars, reading: rc.slice(ri).join(''), ...(highlight ? { highlight: true } : {}) });
            ri = rc.length;
          }
        }
      }
      return result;
    };
    
    const splitSentenceParts = (sentences) => {
      if (!sentences) return [];
      return sentences.map(s => ({
        ...s,
        parts: s.parts ? s.parts.flatMap(splitMixedPart) : []
      }));
    };

    // Phase 2 wrapper: pitch+sentences and kanji details in parallel
    const fetchExtendedData = async (word, skipPitch = false, jlpt = null, definitions = []) => {
      try {
        const [sonnetData, kanjiDetails] = await Promise.all([
          fetchPitchAndSentences(word, skipPitch, jlpt, definitions),
          fetchKanjiDetails(word)
        ]);
        const processedSentences = splitSentenceParts(sonnetData?.sentences || []);
        console.log('[fetchExtendedData] sentences:', processedSentences.length, 'kanji:', kanjiDetails.length);
        return {
          pitchAccent: sonnetData?.pitchAccent || [],
          sentences: processedSentences,
          kanjiDetails
        };
      } catch (error) {
        console.error('Failed to fetch extended data:', error);
        return null;
      }
    };
    
    // Resolve English word → Japanese candidates via Cloud Function
    const resolveEnglishToJapanese = async (englishWord) => {
      try {
        const parsed = await callCloudFunction('resolveEnglish', { englishWord });
        return Array.isArray(parsed) ? parsed : [parsed];
      } catch (error) {
        console.error('Failed to resolve English→Japanese:', error);
        return null;
      }
    };
    
    // Google Cloud TTS via Cloud Function — natural Japanese pronunciation
    const playGoogleTTS = async (text, speed = 1.0, hiraganaHint = null) => {
      try {
        const data = await callCloudFunction('synthesizeSpeech', { text, hiraganaHint, speed });
        if (data.audioContent) {
          return new Audio('data:audio/mp3;base64,' + data.audioContent);
        }
        // SSML failed on server, retry without hint
        if (hiraganaHint) {
          console.warn('[GoogleTTS] SSML may have failed, retrying without hint...');
          return playGoogleTTS(text, speed, null);
        }
        return null;
      } catch (error) {
        console.error('[GoogleTTS] Failed:', error);
        if (hiraganaHint) {
          console.warn('[GoogleTTS] Retrying with plain text...');
          return playGoogleTTS(text, speed, null);
        }
        return null;
      }
    };
    
    // Estimate per-mora timing from total audio duration
    const getMoraTimings = (pitchAccent, totalDuration) => {
      if (!pitchAccent || pitchAccent.length === 0) return [];
      const speechDuration = totalDuration * 0.85;
      const startOffset = totalDuration * 0.08;
      const moraWeight = (kana) => {
        if (kana === 'っ') return 0.5;
        if (kana === 'ん') return 0.8;
        if (kana === 'ー') return 1.2;
        if (/^[うおいえあ]$/.test(kana)) return 0.9;
        return 1.0;
      };
      const weights = pitchAccent.map(m => moraWeight(m.kana));
      const totalWeight = weights.reduce((a, b) => a + b, 0);
      const timings = [];
      let elapsed = startOffset;
      for (let i = 0; i < pitchAccent.length; i++) {
        const dur = (weights[i] / totalWeight) * speechDuration;
        timings.push({ start: elapsed, duration: dur });
        elapsed += dur;
      }
      return timings;
    };
    
    // ============================================
    // SETTINGS PAGE
    // ============================================

      return (

    };
    
    const JLPT_DB_KEY = 'wordHunter_jlptDB';
    const JLPT_DB_META_KEY = 'wordHunter_jlptDB_meta';
    
    const getJlptDB = () => {
      try {
        const raw = localStorage.getItem(JLPT_DB_KEY);
        return raw ? JSON.parse(raw) : null;
      } catch(e) { return null; }
    };
    
    const getJlptDBMeta = () => {
      try {
        const raw = localStorage.getItem(JLPT_DB_META_KEY);
        return raw ? JSON.parse(raw) : null;
      } catch(e) { return null; }
    };
    
    // Import pre-converted JLPT lookup JSON: {"word": "N1", "食べる": "N5", ...}
    const importJlptDB = (jsonText) => {
      try {
        const db = JSON.parse(jsonText);
        const count = Object.keys(db).length;
        localStorage.setItem(JLPT_DB_KEY, JSON.stringify(db));
        localStorage.setItem(JLPT_DB_META_KEY, JSON.stringify({
          count,
          importedAt: new Date().toISOString()
        }));
        return count;
      } catch(e) {
        console.error('[JLPT DB] Parse error:', e);
        return 0;
      }
    };
    
    // Lookup JLPT level for a word
    const lookupJlptLevel = (kanji, hiragana) => {
      const db = getJlptDB();
      if (!db) return null;
      return db[kanji] || db[hiragana] || null;
    };

    // ============================================

    // Used to split furigana across consecutive kanji characters
    
    const READINGS_DB_KEY = 'wordHunter_readingsDB';
    const READINGS_DB_META_KEY = 'wordHunter_readingsDB_meta';

    // Import pre-converted readings JSON: {"連": ["れん"], "続": ["ぞく", "つづ"], ...}
    const importReadingsDB = (jsonText) => {

    // ============================================

      // Generate rubyParts from kanji string + hiragana reading
      // Uses kana characters as anchors, then splits consecutive kanji runs
      // using the kanji readings dictionary for accurate per-character assignment
      generateRubyParts: (kanji, hiragana) => {
        if (!kanji || !hiragana) return [];
        try {
        const isKanji = (c) => /[\u4e00-\u9faf\u3400-\u4dbf]/.test(c);
        const isKana = (c) => /[\u3040-\u309f\u30a0-\u30ff]/.test(c);
        const toHiragana = c => c.charCodeAt(0) >= 0x30A0 && c.charCodeAt(0) <= 0x30FF ? String.fromCharCode(c.charCodeAt(0) - 0x60) : c;
        
        const chars = [...kanji];
        const rc = [...hiragana];
        
        // If word is entirely kana, no ruby needed
        if (chars.every(c => isKana(c))) {
          return chars.map(c => ({ base: c }));
        }
        
        // Split word into runs of kanji vs kana
        const segments = [];
        let cur = { chars: '', type: null };
        for (const ch of chars) {
          const type = isKanji(ch) ? 'kanji' : 'kana';
          if (type !== cur.type && cur.chars) { segments.push({ ...cur }); cur = { chars: '', type: null }; }
          cur.chars += ch; cur.type = type;
        }
        if (cur.chars) segments.push(cur);
        
        // Walk segments and reading in parallel, using kana as anchors
        let ri = 0;
        const parts = [];
        
        for (let si = 0; si < segments.length; si++) {
          const seg = segments[si];
          if (seg.type === 'kana') {
            const sc = [...seg.chars];
            for (const ch of sc) {
              parts.push({ base: ch });
            }
            ri += sc.length;
          } else {
            // Kanji segment: find where the next kana anchor starts in the reading
            const nextKanaSeg = segments.slice(si + 1).find(s => s.type === 'kana');
            let readingEnd;
            
            if (nextKanaSeg) {
              const anchor = toHiragana([...nextKanaSeg.chars][0]);
              // Start searching after at least 1 reading char per kanji in this segment
              const minReading = [...seg.chars].length;
              readingEnd = ri + minReading;
              while (readingEnd < rc.length && toHiragana(rc[readingEnd]) !== anchor) readingEnd++;
            } else {
              readingEnd = rc.length;
            }
            
            const kanjiChars = [...seg.chars];
            const readingSlice = rc.slice(ri, readingEnd).join('');
            
            if (kanjiChars.length === 1) {
              parts.push({ base: kanjiChars[0], ruby: readingSlice });
            } else {
              // Multiple consecutive kanji — use readings dictionary to split
              const split = WordStore.splitKanjiReading(kanjiChars, readingSlice);
              parts.push(...split);
            }
            ri = readingEnd;
          }
        }
        
        return parts;
        } catch(e) {
          console.error('[generateRubyParts] Error for', kanji, hiragana, e);
          return [];
        }
      },
      // e.g. ["連","続","最","適","化"], "れんぞくさいてきか"
      //   → [{base:"連",ruby:"れん"}, {base:"続",ruby:"ぞく"}, ...]
      // Uses backtracking: try each kanji's known readings, see if they match
      // the start of the remaining hiragana, and recurse.
      splitKanjiReading: (kanjiChars, reading) => {
        const db = getReadingsDB();
        
        // Recursive solver with memoization
        const solve = (ki, ri) => {
          // Base case: consumed all kanji
          if (ki === kanjiChars.length) {
            return ri === reading.length ? [] : null; // must also consume all reading
          }
          // No reading left but kanji remain
          if (ri >= reading.length) return null;
          
          const kanjiChar = kanjiChars[ki];
          const remaining = reading.slice(ri);
          
          // Get known readings from dictionary
          const knownReadings = db ? db[kanjiChar] : null;
          
          if (knownReadings) {
            // Sort by length descending to prefer longer matches first
            const sorted = [...knownReadings].sort((a, b) => b.length - a.length);
            for (const r of sorted) {
              if (remaining.startsWith(r)) {
                const rest = solve(ki + 1, ri + r.length);
                if (rest !== null) {
                  return [{ base: kanjiChar, ruby: r }, ...rest];
                }
              }
            }
          }
          
          // Dictionary miss or no match: if last kanji, take all remaining reading
          if (ki === kanjiChars.length - 1) {
            return [{ base: kanjiChar, ruby: remaining }];
          }
          
          // Try brute-force: prefer 2 chars (typical on'yomi), then 1, 3, 4
          for (const len of [2, 1, 3, 4]) {
            if (len > remaining.length) continue;
            const tryReading = remaining.slice(0, len);
            const rest = solve(ki + 1, ri + len);
            if (rest !== null) {
              return [{ base: kanjiChar, ruby: tryReading }, ...rest];
            }
          }
          
          return null; // no valid split found
        };
        
        const result = solve(0, 0);
        if (result) return result;
        
        // Ultimate fallback: emit as single group
        return [{ base: kanjiChars.join(''), ruby: reading }];

        let pitchAccent = data.pitchAccent || [];

        if (pitchSource !== 'kanjium' && data.kanji && data.hiragana) {

              fixed.push({
                kana: pitchAccent[i].kana + next.kana,
                pitch: pitchAccent[i].pitch,
                romaji: moraToRomaji(pitchAccent[i].kana + next.kana) || (pitchAccent[i].romaji + next.romaji)
              });
              i++; // skip next
            } else {
              fixed.push(pitchAccent[i]);
            }
          }
          pitchAccent = fixed;
        }
        
        return {
          kanji: data.kanji || '?',
          hiragana: data.hiragana || '',
          romaji: data.romaji || '—',
          english: data.english || '',
          partOfSpeech: data.partOfSpeech || 'unknown',

          if (kanjiumPitch) console.log('[WordStore] Kanjium pitch found:', coreData.kanji);
          
          // Build partial word with placeholder extended data
          const partialWord = {
            ...coreData,

            pitchAccent: kanjiumPitch || [],

          // Phase 2: fetch extended data in background
          // Skip pitch in Claude call if Kanjium already has it
          console.log('[WordStore] Phase 2: fetching extended data...' + (kanjiumPitch ? ' (skipping pitch — Kanjium has it)' : ''));
          const japaneseWord = coreData.kanji || word;

          console.log('[WordStore] Phase 2 result:', extData ? 'SUCCESS' : 'FAILED');
          
          if (extData) {

            const finalPitch = kanjiumPitch || extData.pitchAccent || partialWord.pitchAccent;

      const jlptColors = { 'N5': '#4ade80', 'N4': '#a3e635', 'N3': '#f59e0b', 'N2': '#f472b6', 'N1': '#ef4444' };
      const jlptColor = jlptColors[word.jlpt] || '#888';
      const ctx = word.contextUsage || { daily: 0, media: 0, business: 0, academic: 0 };
      const defs = word.definitions || [];
      const [expandedDefs, setExpandedDefs] = useState({});
      
      return (
        <div style={{ display: 'flex', flexDirection: 'column', gap: '16px' }}>
          <div style={{ display: 'flex', flexDirection: 'column', gap: '24px' }}>
            {defs.length > 0 ? defs.map((d, i) => {
              const isRare = d.frequency === 'rare';
              const isUncommon = d.frequency === 'uncommon';
              const isFaded = isRare || isUncommon;
              const isCollapsed = i > 0 && !expandedDefs[i];
              return (
                <div key={i}>
                  <div style={{ display: 'flex', alignItems: 'center', gap: '6px', marginBottom: '2px' }}>
                    <span style={{ fontSize: '14px', fontWeight: '600', color: isRare ? '#aaa' : isUncommon ? '#999' : '#1a1a1a' }}>{d.meaning}</span>
                    {isUncommon && (
                      <span style={{
                        fontSize: '9px', fontWeight: '700', letterSpacing: '0.2px',
                        textTransform: 'uppercase', padding: '2px 8px', borderRadius: '10px',
                        lineHeight: '14px', whiteSpace: 'nowrap',
                        background: '#fef9c3', color: '#ca8a04'
                      }}>Uncommon</span>
                    )}
                    {isRare && (
                      <span style={{
                        fontSize: '9px', fontWeight: '700', letterSpacing: '0.2px',
                        textTransform: 'uppercase', padding: '2px 8px', borderRadius: '10px',
                        lineHeight: '14px', whiteSpace: 'nowrap',
                        background: '#fef2f2', color: '#b45309'
                      }}>Rare</span>
                    )}
                  </div>
                  {isCollapsed ? (
                    <button
                      onClick={() => setExpandedDefs(prev => ({ ...prev, [i]: true }))}
                      style={{
                        background: 'none', border: 'none', cursor: 'pointer', padding: '2px 0',
                        fontSize: '12px', color: '#999', fontStyle: 'italic'
                      }}
                    >Show definition ›</button>
                  ) : (
                    <div style={{ fontSize: '13px', lineHeight: 1.6, color: isRare ? '#bbb' : isUncommon ? '#999' : '#444' }}>{d.definition}</div>
                  )}
                </div>
              );
            }) : (
              <div style={{ fontSize: '14px', lineHeight: 1.7, color: '#333' }}>{word.definition || 'Definition loading...'}</div>
            )}
          </div>
          <div style={{ height: '1px', background: 'linear-gradient(90deg, transparent, rgba(0,0,0,0.1), transparent)', margin: '4px 0' }}/>
          <div style={{ display: 'flex', flexWrap: 'wrap', gap: '6px' }}>
            {['daily', 'media', 'business', 'academic'].map(c => {
              const level = ctx[c] || 0;
              if (level !== 0 && level !== 3) return null;
              return <ContextTag key={c} context={c} usageLevel={level} />;
            })}
          </div>
        </div>
      );
    };
    
    const ExamplesTab = ({ word }) => {
      const sentences = word.sentences || [];
      const defs = word.definitions || [];
      
      if (sentences.length === 0) {
        return (
          <div style={{ textAlign: 'center', padding: '40px 0', color: '#999' }}>
            <p style={{ fontSize: '14px', fontWeight: '600' }}>No examples available yet</p>
            <p style={{ fontSize: '12px', marginTop: '8px' }}>Examples may still be loading</p>
          </div>
        );
      }
      
      // Build one group per definition by matching sentences via defMeaning
      const groups = [];
      if (defs.length > 1) {
        const used = new Set();
        // First pass: exact match on defMeaning to definition meaning
        defs.forEach((d) => {
          const matching = [];
          sentences.forEach((s, si) => {
            if (used.has(si) || !s.defMeaning) return;
            const dm = s.defMeaning.toLowerCase().trim();
            const defM = d.meaning.toLowerCase().trim();
            // Exact match or one contains the other
            if (dm === defM || dm.includes(defM) || defM.includes(dm)) {
              matching.push(s);
              used.add(si);
            }
          });
          groups.push({ def: d, sentences: matching });
        });
        // Second pass: keyword match for any still unmatched
        sentences.forEach((s, si) => {
          if (used.has(si) || !s.defMeaning) return;
          const dm = s.defMeaning.toLowerCase();
          for (let g = 0; g < groups.length; g++) {
            const keywords = groups[g].def.meaning.toLowerCase().split(/[\s\/,]+/).filter(w => w.length > 2);
            if (keywords.some(kw => dm.includes(kw))) {
              groups[g].sentences.push(s);
              used.add(si);
              break;
            }
          }
        });
        // Third pass: distribute any remaining unmatched round-robin
        const unmatched = sentences.filter((_, si) => !used.has(si));
        unmatched.forEach((s, i) => {
          const emptyGroup = groups.find(g => g.sentences.length === 0);
          if (emptyGroup) {
            emptyGroup.sentences.push(s);
          } else {
            groups[i % groups.length].sentences.push(s);
          }
        });
      } else {
        // Single definition: all sentences, no cards
        groups.push({ def: defs[0] || null, sentences });
      }
      
      let counter = 0;
      const multiDef = defs.length > 1;
      return (
        <div style={{ display: 'flex', flexDirection: 'column', gap: '10px' }}>
          {groups.map((group, gi) => {
            const d = group.def;
            const isRare = d && d.frequency === 'rare';
            const isUncommon = d && d.frequency === 'uncommon';
            if (group.sentences.length === 0 && multiDef) return null;
            return (
              <div key={gi}>
                {multiDef && d && (
                  <div style={{ display: 'flex', alignItems: 'center', gap: '6px', marginBottom: '6px', marginTop: gi > 0 ? '16px' : '0' }}>
                    <span style={{ fontSize: '10px', fontWeight: '600', color: isRare ? '#bbb' : isUncommon ? '#aaa' : '#888' }}>{d.meaning}</span>
                    {isUncommon && (
                      <span style={{
                        fontSize: '9px', fontWeight: '700', letterSpacing: '0.2px',
                        textTransform: 'uppercase', padding: '2px 8px', borderRadius: '10px',
                        lineHeight: '14px', whiteSpace: 'nowrap',
                        background: '#fef9c3', color: '#ca8a04'
                      }}>Uncommon</span>
                    )}
                    {isRare && (
                      <span style={{
                        fontSize: '9px', fontWeight: '700', letterSpacing: '0.2px',
                        textTransform: 'uppercase', padding: '2px 8px', borderRadius: '10px',
                        lineHeight: '14px', whiteSpace: 'nowrap',
                        background: '#fef2f2', color: '#b45309'
                      }}>Rare</span>
                    )}
                  </div>
                )}
                <div style={{ display: 'flex', flexDirection: 'column', gap: '16px' }}>
                  {group.sentences.map((sentence, si) => {
                    counter++;
                    return (
                      <div key={sentence.id || counter} style={{
                        background: '#fff', borderRadius: '12px', padding: '2px 14px 8px 14px',
                        border: '1px solid #f0f0f0'
                      }}>
                        <FuriganaText parts={sentence.parts || []} />
                        <div style={{ fontSize: '13px', color: '#666', marginTop: '4px' }}>{sentence.english || ''}</div>
                      </div>
                    );
                  })}
                </div>
              </div>
            );
          })}
        </div>
      );
    };
    
    const PitchVisual = ({ pitchAccent, activeMora = -1 }) => {
      if (!pitchAccent || pitchAccent.length < 2) {
        return <div style={{ fontSize: '13px', color: '#999', textAlign: 'center', padding: '20px' }}>Pitch data not available</div>;
      }

      const count = pitchAccent.length;
      const colW = 36;
      const totalW = count * colW;
      const highY = 14;
      const lowY = 42;
      const svgH = 56;

      return (
        <div style={{ display: 'inline-flex', flexDirection: 'column', alignItems: 'center' }}>
          <svg width={totalW} height={svgH}>
            {pitchAccent.map((item, i) => {
              if (i === count - 1) return null;
              const x1 = i * colW + colW / 2;
              const y1 = item.pitch === 1 ? highY : lowY;
              const x2 = (i + 1) * colW + colW / 2;
              const y2 = pitchAccent[i + 1].pitch === 1 ? highY : lowY;
              const isActiveLine = i === activeMora || i + 1 === activeMora;
              return <line key={`l${i}`} x1={x1} y1={y1} x2={x2} y2={y2} stroke="#ff3366" strokeWidth="2.5" strokeLinecap="round"
                style={{ opacity: activeMora >= 0 ? (isActiveLine ? 1 : 0.3) : 1, transition: 'opacity 0.1s' }} />;
            })}
            {pitchAccent.map((item, i) => {
              const cx = i * colW + colW / 2;
              const cy = item.pitch === 1 ? highY : lowY;
              const isActive = i === activeMora;
              const isPast = activeMora >= 0 && i < activeMora;
              return (
                <g key={`c${i}`}>
                  {isActive && (
                    <circle cx={cx} cy={cy} r="12" fill="none" stroke="#ff3366" strokeWidth="2"
                      style={{ opacity: 0.4, animation: 'dotPulse 0.4s ease-out' }} />
                  )}
                  <circle cx={cx} cy={cy}
                    r={isActive ? 7 : 5}
                    fill="#ff3366"
                    style={{
                      opacity: activeMora >= 0 ? (isActive ? 1 : isPast ? 0.5 : 0.3) : 1,
                      transition: 'opacity 0.1s',
                    }}
                  />
                </g>
              );
            })}
          </svg>
          <div style={{ display: 'flex', width: totalW }}>
            {pitchAccent.map((item, i) => {
              const isActive = i === activeMora;
              const isPast = activeMora >= 0 && i < activeMora;
              return (
                <div key={i} style={{
                  width: colW, display: 'flex', flexDirection: 'column',
                  alignItems: 'center', gap: '1px',
                  transition: 'opacity 0.1s',
                  opacity: activeMora >= 0 ? (isActive ? 1 : isPast ? 0.5 : 0.35) : 1,
                }}>
                  <span style={{
                    fontSize: '15px', fontWeight: isActive ? '800' : '600',
                    color: isActive ? '#ff3366' : '#000',
                    lineHeight: 1.2, whiteSpace: 'nowrap',
                    transition: 'color 0.1s',
                  }}>{item.kana}</span>
                  <span style={{
                    fontSize: '9px', fontWeight: '500',
                    color: isActive ? 'rgba(255,51,102,0.6)' : 'rgba(0,0,0,0.3)',
                    lineHeight: 1, transition: 'color 0.1s',
                  }}>{item.romaji}</span>
                </div>
              );
            })}
          </div>
          <style>{`
            @keyframes dotPulse {
              0% { r: 7; opacity: 0.6; }
              100% { r: 14; opacity: 0; }
            }
          `}</style>
        </div>
      );
    };
    
    const HearTab = ({ word }) => {
      const [isPlaying, setIsPlaying] = useState(null);
      const [activeMora, setActiveMora] = useState(-1);
      const animFrameRef = useRef(null);
      
      const handlePlay = async (speed) => {
        if (isPlaying) return;
        setIsPlaying(speed);
        const rate = speed === 'superslow' ? 0.45 : speed === 'slow' ? 0.7 : 1.0;
        
        // Try Google TTS via Cloud Function — returns audio element
        try {
          const audio = await playGoogleTTS(word.kanji, rate, word.hiragana);
          if (audio) {
            // Wait for duration metadata
            await new Promise(resolve => {
              if (audio.duration && audio.duration !== Infinity) resolve();
              else audio.addEventListener('loadedmetadata', resolve, { once: true });
            });
            
            const duration = audio.duration;
            const timings = word.pitchAccent ? getMoraTimings(word.pitchAccent, duration) : [];
            
            audio.play();
            const startTime = performance.now();
            
            if (timings.length > 0) {
              const animate = () => {
                const elapsed = (performance.now() - startTime) / 1000;
                let current = -1;
                for (let i = 0; i < timings.length; i++) {
                  if (elapsed >= timings[i].start && elapsed < timings[i].start + timings[i].duration) {
                    current = i;
                    break;
                  }
                }
                setActiveMora(current);
                if (elapsed < duration) {
                  animFrameRef.current = requestAnimationFrame(animate);
                }
              };
              animFrameRef.current = requestAnimationFrame(animate);
            }
            
            audio.onended = () => {
              if (animFrameRef.current) cancelAnimationFrame(animFrameRef.current);
              setActiveMora(-1);
              setIsPlaying(null);
            };
            audio.onerror = () => {
              if (animFrameRef.current) cancelAnimationFrame(animFrameRef.current);
              setActiveMora(-1);
              setIsPlaying(null);
            };
            return;
          }
          console.warn('[HearTab] Google TTS failed, falling back to browser');
        } catch (err) {
          console.warn('[HearTab] Google TTS error:', err.message, '— falling back to browser');
        }
        
        // Fallback: browser SpeechSynthesis (no pitch animation)
        const utterance = new SpeechSynthesisUtterance(word.hiragana || word.kanji);
        utterance.lang = 'ja-JP';
        utterance.rate = speed === 'superslow' ? 0.3 : speed === 'slow' ? 0.5 : 1.0;
        utterance.onend = () => setIsPlaying(null);
        utterance.onerror = () => setIsPlaying(null);
        speechSynthesis.speak(utterance);
      };
      
      useEffect(() => () => { if (animFrameRef.current) cancelAnimationFrame(animFrameRef.current); }, []);
      
      // Detect pitch pattern from data
      const detectPitchPattern = (pitchAccent) => {
        if (!pitchAccent || pitchAccent.length < 2) return { name: 'unknown', japanese: '不明', description: 'Pitch pattern could not be determined.' };
        const pitches = pitchAccent.map(p => p.pitch);
        const n = pitches.length;
        
        let dropAfter = -1;
        for (let i = 0; i < n - 1; i++) {
          if (pitches[i] === 1 && pitches[i + 1] === 0) { dropAfter = i; break; }
        }
        
        if (dropAfter === 0) {
          return { name: 'atamadaka', japanese: '頭高型', description: 'Starts high on the first mora, then drops and stays low. Emphasize the very first beat.' };
        }
        if (dropAfter === -1) {
          if (pitches[0] === 0) {
            return { name: 'heiban', japanese: '平板型', description: 'Starts low, rises after the first mora, and stays high — even when followed by a particle. Flat and even.' };
          }
          return { name: 'heiban', japanese: '平板型', description: 'Stays at a consistent pitch throughout.' };
        }
        if (dropAfter === n - 2) {
          if (pitches[0] === 0) {
            return { name: 'odaka', japanese: '尾高型', description: 'Starts low, rises, and stays high through the last mora — but drops when followed by a particle like は or が.' };
          }
        }
        if (dropAfter >= 1) {
          return { name: 'nakadaka', japanese: '中高型', description: `Starts low, rises, then drops after mora ${dropAfter + 1}. The pitch peaks in the middle of the word.` };
        }
        return { name: 'unknown', japanese: '不明', description: 'Pitch pattern could not be classified.' };
      };
      
      const pattern = detectPitchPattern(word.pitchAccent);
      
      return (
        <div style={{ display: 'flex', flexDirection: 'column', gap: '24px' }}>
          <div style={{ background: '#f8f8f8', borderRadius: '12px', padding: '20px 16px', display: 'flex', flexDirection: 'column', alignItems: 'center', gap: '8px', overflow: 'auto' }}>
            <div style={{ fontSize: '11px', fontWeight: '700', color: '#888' }}>PITCH ACCENT</div>
            <PitchVisual pitchAccent={word.pitchAccent} activeMora={activeMora} />
          </div>
          <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', gap: '8px' }}>
            <div style={{ display: 'flex', justifyContent: 'center', gap: '10px' }}>
            {['normal', 'slow', 'superslow'].map(speed => {
              const active = isPlaying === speed;
              const label = speed === 'superslow' ? '🐢🐢🐢' : speed === 'slow' ? 'Slow' : 'Listen';
              const icon = speed === 'superslow' ? null : speed === 'slow' ? <span style={{ fontSize: '14px' }}>🐢</span> : (
                active ? <span style={{ fontSize: '12px' }}>◼</span> : <svg width="14" height="14" viewBox="0 0 24 24" fill="#1a1a2e"><polygon points="6,3 20,12 6,21" /></svg>
              );
              return (
              <button key={speed} onClick={() => handlePlay(speed)}
                style={{
                background: active ? '#ffe600' : '#f0f0f0',
                color: '#1a1a2e',
                border: 'none',
                borderRadius: '12px', padding: '10px 20px',
                fontSize: '13px', fontWeight: '600', cursor: isPlaying ? 'default' : 'pointer',
                display: 'flex', alignItems: 'center', gap: '8px',
                transition: 'all 0.15s ease',
                opacity: isPlaying && !active ? 0.4 : 1,
                animation: active ? 'breathe 1.5s ease-in-out infinite' : 'none',
              }}>
                {icon}
                {label}
              </button>
              );
            })}
            </div>
          </div>
          <div style={{ background: '#f8f8f8', borderRadius: '10px', padding: '12px 14px', fontSize: '12px', color: '#555', lineHeight: 1.5 }}>
            This word has a <strong>{pattern.name} pitch pattern</strong> ({pattern.japanese}). {pattern.description}
          </div>
          {word.pitchSource && (
            <div style={{ textAlign: 'center', fontSize: '10px', color: '#aaa' }}>
              {word.pitchSource === 'kanjium' ? '📚 Pitch data from Kanjium dictionary (Wadoku)' : '🤖 AI-generated pitch (may be inaccurate)'}
            </div>
          )}
          <style>{`
            @keyframes breathe {
              0%, 100% { opacity: 0.9; }
              50% { opacity: 0.5; }
            }
          `}</style>
        </div>
      );
    };
    
    const KanjiTab = ({ word, onCaptureKanji }) => {
      const kanjiDetails = word.kanjiDetails || [];
      if (kanjiDetails.length === 0) {
        return (
          <div style={{ textAlign: 'center', padding: '40px 0', color: '#999' }}>
            <p style={{ fontSize: '14px', fontWeight: '600' }}>No kanji breakdown available yet</p>
            <p style={{ fontSize: '12px', marginTop: '8px' }}>Kanji details may still be loading</p>
          </div>
        );
      }
      
      return (
        <div style={{ display: 'flex', flexDirection: 'column', gap: '12px' }}>
          {kanjiDetails.map((k, index) => (
            <button

              onClick={() => onCaptureKanji && onCaptureKanji(k.kanji, word.kanji)}
              style={{

                padding: '20px', cursor: 'pointer', textAlign: 'left',
                display: 'flex', alignItems: 'center', gap: '20px',

              }}
              onMouseEnter={e => { e.currentTarget.style.border = '2px solid #000'; e.currentTarget.style.boxShadow = '3px 3px 0 #000'; e.currentTarget.style.transform = 'translate(-1px, -1px)'; }}
              onMouseLeave={e => { e.currentTarget.style.border = '2px solid #e5e5e5'; e.currentTarget.style.boxShadow = 'none'; e.currentTarget.style.transform = 'none'; }}
            >
              <div style={{
                fontSize: '52px', fontWeight: '400', color: '#000',
                fontFamily: "'Noto Serif JP', serif", lineHeight: 1,
                flexShrink: 0, width: '70px', textAlign: 'center'
              }}>
                {k.kanji}
              </div>
              <div style={{ flex: 1, minWidth: 0 }}>
                <div style={{
                  fontSize: '15px', fontWeight: '600', color: '#000',
                  fontFamily: "'Noto Serif JP', serif",
                  marginBottom: '6px'
                }}>
                  {k.meaning}
                </div>
                <div style={{ fontSize: '11px', color: '#999' }}>
                  {k.strokeCount} strokes · Tap to learn this kanji
                </div>
              </div>
              <div style={{ fontSize: '18px', flexShrink: 0, color: '#ccc' }}>→</div>
            </button>
          ))}
        </div>
      );
    };

    // ============================================
    // TAB LOADING SKELETON
    // ============================================
    
    const TabLoading = ({ label }) => {
      const [elapsed, setElapsed] = useState(0);
      useEffect(() => {
        const timer = setInterval(() => setElapsed(e => e + 1), 1000);
        return () => clearInterval(timer);

      return (

            @keyframes spin { to { transform: rotate(360deg); } }

        </div>
      );
    };

    // ============================================
    // WORD CARD
    // ============================================
    
    const tabs = [
      { id: 'define', label: 'Define' },
      { id: 'examples', label: 'Examples' },
      { id: 'hear', label: 'Hear' },
      { id: 'kanji', label: 'Kanji' }
    ];
    
    const JlptBadge = ({ jlpt, color }) => {

      return (

    const WordCard = ({ word, onCaptureKanji, isPinned, onTogglePin }) => {
      const [activeTab, setActiveTab] = useState('define');
      const [showPinToast, setShowPinToast] = useState(false);
      const [showRubyDebug, setShowRubyDebug] = useState(false);
      const prevPinned = React.useRef(isPinned);
      
      React.useEffect(() => {

          const t = setTimeout(() => setShowPinToast(false), 1200);
          return () => clearTimeout(t);

        prevPinned.current = isPinned;
      }, [isPinned]);
      
      const jlptBadgeColors = { 'N5': '#4ade80', 'N4': '#a3e635', 'N3': '#f59e0b', 'N2': '#f472b6', 'N1': '#ef4444' };
      const jlptBadgeColor = jlptBadgeColors[word.jlpt] || '#888';
      
      // Dynamic font sizing: scale down for longer words
      const charCount = [...(word.kanji || '')].length;
      const displayKanji = charCount > 12 ? [...word.kanji].slice(0, 12).join('') + '…' : word.kanji;
      const kanjiSize = charCount <= 4 ? 68 : charCount <= 6 ? 48 : charCount <= 8 ? 38 : charCount <= 12 ? 30 : 28;
      
      return (

      const hiraganaDict = useRef({

      const handleRecordingResult = useCallback((result) => {

        const { transcript: text, alternatives: alts, language: lang, reading, confidence } = result;

        if (!text) {
          setStatus('error');
          setErrorMessage("No speech detected");
          return;

        // Auto-confirm: skip editing screen if confidence >= 75%
        if (confidence >= 0.75) {
          capLog(`⚡ Auto-confirm (${Math.round(confidence * 100)}% >= 75%)`);
          setTranscript(text);
          setCaptureConfidence(confidence);
          handleResolvedSubmit(text, lang);

        setTranscript(text);
        setAlternatives(alts);
        setEditValue(text);
        setEditReading(reading || '');
        setCaptureConfidence(confidence || 0);
        setStatus('editing');
      }, []);

        setTranscript(text);
        
        if (lang === 'ja') {

        } else {
          setStatus('success');
          setResolving(true);
          handleEnglishResolve(text);
        }
      }, []);
      
      // Extract reading from alternatives (shared by both speech paths)
      const extractReading = (text, alternatives, lang) => {
        if (lang !== 'ja') return '';
        const isAllKana = (s) => /^[\u3040-\u309f\u30a0-\u30ff\u30fc]+$/.test(s);
        const hasKanji = /[\u4e00-\u9faf\u3400-\u4dbf]/.test(text);
        if (!hasKanji) return '';
        for (const alt of alternatives) {
          const altText = (alt.transcript || alt).toString().replace(/\s+/g, '');
          if (isAllKana(altText) && altText !== text) return altText;
        }
        return '';
      };

        stopCurrentRecognition();

        activeTimersRef.current.prep = setTimeout(() => { setListeningReady(true); }, 250);
        
        const currentLang = langRef.current;
        const recognizerLang = currentLang === 'ja' ? 'ja-JP' : 'en-US';
        
        const countdownId = setInterval(() => {
          setTimeLeft(prev => {
            if (prev <= 1) { clearInterval(countdownId); return 0; }

        }, 1000);
        activeTimersRef.current.countdown = countdownId;

          const sttPromise = recognizeWithCloudSTT(recognizerLang);
          activeRecRef.current = { stop: () => sttPromise.ctrl?.stop?.(), abort: () => sttPromise.ctrl?.cancel?.(), ctrl: sttPromise.ctrl };
          
          // Bind volume meter and logging — direct DOM, no React re-renders
          sttPromise.ctrl.updateMeter = (pct, color) => {
            const el = volumeBarRef.current;
            if (el) { el.style.width = pct + '%'; el.style.background = color; }
          };
          sttPromise.ctrl.log = (msg) => capLog(msg);
          
          sttPromise.then(result => {
            clearInterval(countdownId);
            if (captureGenRef.current !== thisGen) { capLog('↩ Stale CloudSTT result discarded (gen ' + thisGen + ' vs ' + captureGenRef.current + ')'); return; }
            if (gotFinalRef.current) { capLog('↩ CloudSTT result discarded (user switched to manual)'); return; }
            const elapsed = Date.now() - recStartTimeRef.current;
            capLog(`✅ CloudSTT result: "${result.transcript}" (${result.alternatives.length} alts, conf: ${Math.round(result.confidence * 100)}%, elapsed: ${elapsed}ms)`);
            
            // Capture summary: 4 phases
            if (result.timing) {
              const t = result.timing;
              const displayStart = Date.now();
              const total = elapsed;
              capLog(`📊 CAPTURE SUMMARY — Total: ${total}ms`);
              capLog(`   🎙 Capture: ${t.captureMs}ms (mic init → silence end)`);
              capLog(`   📦 Package: ${t.packMs}ms (audio encode → send to Google)`);
              capLog(`   🌐 API: ${t.apiMs}ms (Google STT round-trip)`);
              // Display phase logged by useEffect when status changes to 'editing'
              recStartTimeRef.current = displayStart; // reset so editing useEffect measures display phase only
              capLog(`   🖥 Display: (pending render...)`);
            }
            
            const text = currentLang === 'ja' ? (result.transcript || '').replace(/\s+/g, '') : (result.transcript || '');
            const reading = extractReading(text, result.alternatives, currentLang);
            
            handleRecordingResult({
              transcript: text,
              alternatives: result.alternatives,
              language: currentLang,
              reading,
              confidence: result.confidence
            });
          }).catch(err => {
            clearInterval(countdownId);
            // Discard if a newer recording has started
            if (captureGenRef.current !== thisGen) { capLog('↩ Stale CloudSTT error discarded'); return; }
            if (gotFinalRef.current) { capLog('↩ CloudSTT cancelled (intentional)'); return; }
            capLog(`❌ CloudSTT error: ${err.message}`, 'error');
            if (err.message === 'mic-denied') {
              setStatus('manual');
              setErrorMessage("Mic unavailable. Type instead:");
            } else {
              setStatus('error');
              setErrorMessage(err.message === 'stt-api-error' ? "Speech API error — check Google key" : "No speech detected");
            }
          });
          
          return;
        }
        
        // ===== Web Speech API path =====
        if (!('webkitSpeechRecognition' in window || 'SpeechRecognition' in window)) {
          clearInterval(countdownId);
          setStatus('manual');
          setErrorMessage("Speech recognition not supported. Type instead:");
          return;
        }
        
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        const recognition = new SpeechRecognition();
        recognition.lang = recognizerLang;
        recognition.interimResults = true;
        recognition.continuous = false;
        recognition.maxAlternatives = 5;
        activeRecRef.current = recognition;
        
        gotFinalRef.current = false;
        lastInterimRef.current = '';
        hadInterimRef.current = false;
        recStartTimeRef.current = Date.now();
        capLog(`🎙 Starting recognition (${recognizerLang})`);
        
        const timeoutId = setTimeout(() => {
          capLog('⏰ 7s timeout — stopping', 'warn');
          try { recognition.stop(); } catch(e) {}
          clearInterval(countdownId);
          if (!gotFinalRef.current) {
            capLog('❌ No speech detected (timeout)', 'error');
            setStatus('error');
            setErrorMessage("No speech detected");
          }
        }, 7000);
        activeTimersRef.current.timeout = timeoutId;
        
        recognition.onaudiostart = () => capLog('🔊 Audio stream started');
        recognition.onaudioend = () => capLog('🔇 Audio stream ended');
        recognition.onspeechstart = () => capLog('🗣 Speech detected');
        recognition.onspeechend = () => capLog('🤐 Speech ended');
        recognition.onstart = () => capLog('✅ Recognition started');
        
        recognition.onresult = (event) => {
          const current = event.results[event.results.length - 1];
          let text = current[0].transcript;
          if (langRef.current === 'ja') text = text.replace(/\s+/g, '');
          const chars = [...text];
          setTranscript(chars.length > 12 ? chars.slice(0, 12).join('') : text);
          
          if (!current.isFinal) {
            hadInterimRef.current = true;
            capLog(`📝 interim: "${text}"`);
          }
          
          if (!current.isFinal && langRef.current === 'ja') {
            lastInterimRef.current = text.replace(/\s+/g, '');
          }
          
          if (current.isFinal) {
            capLog(`✅ FINAL: "${text}" (${current.length} alts, conf: ${Math.round((current[0].confidence || 0) * 100)}%)`);
            gotFinalRef.current = true;
            clearTimeout(timeoutId);
            clearInterval(countdownId);
            
            // Build alternatives array (same shape for both languages)
            const alts = [];
            const altCount = Math.min(current.length, 3);
            for (let i = 0; i < altCount; i++) {
              const altText = langRef.current === 'ja' ? current[i].transcript.replace(/\s+/g, '') : current[i].transcript;
              alts.push({ transcript: altText, confidence: current[i].confidence });
            }
            
            // Extract reading for Japanese
            let reading = '';
            if (langRef.current === 'ja') {
              reading = extractReading(text, alts, 'ja');
              if (!reading) {
                const interim = lastInterimRef.current;
                if (interim && interim !== text) reading = interim;
              }
            }
            
            handleRecordingResult({
              transcript: text,
              alternatives: alts,
              language: langRef.current,
              reading,
              confidence: current[0].confidence || 0
            });
          }
        };
        
        recognition.onerror = (event) => {
          capLog(`⚠️ onerror: ${event.error}${event.message ? ' — ' + event.message : ''}`, 'error');
          clearTimeout(timeoutId);
          clearInterval(countdownId);
          if (event.error === 'aborted') { capLog('↩ Ignoring abort (intentional)'); return; }
          if (event.error === 'not-allowed' || event.error === 'service-not-allowed') {
            capLog('🚫 Mic not allowed → manual mode', 'error');
            setStatus('manual');
            setErrorMessage("Mic unavailable. Type instead:");
          } else {
            capLog(`❌ Error → error state: ${event.error}`, 'error');
            setStatus('error');
            setErrorMessage(event.error === 'no-speech' ? "No speech detected" : `Error: ${event.error}`);
          }
        };
        
        recognition.onend = () => {
          const elapsed = Date.now() - recStartTimeRef.current;
          capLog(`🔚 onend — gotFinal: ${gotFinalRef.current}, hadInterim: ${hadInterimRef.current}, elapsed: ${elapsed}ms`);
          clearTimeout(timeoutId);
          clearInterval(countdownId);
          if (!gotFinalRef.current) {
            capLog('⚠️ Ended without final result → setting error', 'warn');
            setStatus(prev => prev === 'listening' ? 'error' : prev);
            setErrorMessage(prev => prev || "Recognition failed");
          }
        };
        
        try { recognition.start(); capLog('📡 recognition.start() called'); }
        catch (e) { capLog(`💥 start() threw: ${e.message}`, 'error'); clearInterval(countdownId); setStatus('manual'); setErrorMessage("Mic unavailable. Type instead:"); }

            setTranscript(topResult.kanji);
            onCaptureRef.current(topResult.kanji);
          } else {
            setCandidates(results.slice(0, 3));
            setStatus('picking');
          }
        } else {
          onCaptureRef.current(englishText);
        }

          {/* Debug log panel */}
          <button onClick={() => setShowDebugLog(!showDebugLog)} style={{

            padding: '4px 10px', fontSize: '11px', color: 'rgba(255,255,255,0.5)', cursor: 'pointer',

          {showDebugLog && (

              background: '#0a0a0a', borderRadius: '12px', padding: '10px',
              maxHeight: '40vh', overflowY: 'auto', border: '1px solid rgba(255,255,255,0.1)',
            }}>
              <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: '6px' }}>
                <span style={{ fontSize: '11px', fontWeight: '700', color: '#ffe600' }}>Capture Log ({debugLog.length})</span>
                <button onClick={() => setDebugLog([])} style={{ background: 'none', border: 'none', fontSize: '10px', color: '#666', cursor: 'pointer' }}>Clear</button>
