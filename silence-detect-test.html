<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Silence Detect v3</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, sans-serif; background: #1a1a2e; color: #fff; min-height: 100vh; display: flex; flex-direction: column; }
  
  .tabs { display: flex; background: rgba(255,255,255,0.97); position: fixed; bottom: 0; left: 0; right: 0; height: 56px; z-index: 100; }
  .tab { flex: 1; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 600; color: #5f6368; border: none; background: none; cursor: pointer; position: relative; }
  .tab.active { color: #1a1a2e; }
  .tab.active::after { content: ''; position: absolute; bottom: 0; left: 25%; right: 25%; height: 3px; background: #ffe600; border-radius: 2px; }

  .page { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 24px; padding-bottom: 100px; min-height: 100vh; }
  .placeholder { color: rgba(255,255,255,0.2); font-size: 16px; }
  
  .lang-toggle { display: flex; background: rgba(255,255,255,0.08); border-radius: 50px; padding: 3px; margin-bottom: 28px; }
  .lang-btn { padding: 6px 14px; border-radius: 50px; border: none; font-size: 12px; font-weight: 700; cursor: pointer; }
  .lang-ja { background: #ffe600; color: #000; }
  .lang-en { background: #60a5fa; color: #fff; }
  .lang-off { background: transparent; color: rgba(255,255,255,0.4); }
  
  .mic-ring { width: 120px; height: 120px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; }
  .mic-circle { width: 80px; height: 80px; border-radius: 50%; display: flex; align-items: center; justify-content: center; }
  .mic-icon { width: 24px; height: 24px; border-radius: 4px; background: #fff; }
  
  .status-text { margin-top: 24px; font-size: 18px; font-weight: 600; }
  .hint-text { margin-top: 6px; font-size: 14px; color: rgba(255,255,255,0.4); }
  .result { margin-top: 20px; font-size: 28px; font-weight: 700; color: #ffe600; text-align: center; }
  
  .retry-btn { margin-top: 20px; background: transparent; border: 1px solid rgba(255,255,255,0.1); border-radius: 10px; padding: 8px 20px; color: rgba(255,255,255,0.35); font-size: 13px; font-weight: 500; cursor: pointer; display: flex; align-items: center; gap: 6px; }
  
  /* Diagnostics */
  .diag-strip { display: flex; gap: 8px; margin-top: 14px; align-items: center; flex-wrap: wrap; justify-content: center; }
  .badge { font-size: 9px; font-weight: 700; letter-spacing: 0.4px; padding: 3px 8px; border-radius: 4px; }
  .badge-wait { background: rgba(255,255,255,0.05); color: rgba(255,255,255,0.25); }
  .badge-speech { background: rgba(255,230,0,0.15); color: #ffe600; }
  .badge-trail { background: rgba(255,51,102,0.15); color: #ff3366; }
  .rms-val { font-size: 10px; font-family: monospace; color: rgba(255,255,255,0.25); }
  
  .meter-wrap { margin-top: 10px; width: 200px; height: 6px; background: rgba(255,255,255,0.04); border-radius: 3px; overflow: hidden; position: relative; }
  .meter-bar { height: 100%; border-radius: 3px; width: 0%; transition: width 0.06s; }
  /* Threshold markers */
  .thresh-mark { position: absolute; top: -2px; bottom: -2px; width: 1px; }
  
  .timer { margin-top: 10px; font-size: 13px; color: rgba(255,255,255,0.2); }
  
  .debug { position: fixed; top: 0; left: 0; right: 0; max-height: 35vh; overflow-y: auto; background: rgba(0,0,0,0.92); padding: 6px; font-size: 9px; font-family: monospace; z-index: 200; display: none; line-height: 1.4; }
  .debug.show { display: block; }
  .dbg-btn { position: fixed; top: 6px; right: 6px; z-index: 201; background: rgba(0,0,0,0.5); border: none; border-radius: 6px; padding: 3px 8px; font-size: 9px; color: rgba(255,255,255,0.4); cursor: pointer; }
  
  .version { position: fixed; bottom: 60px; left: 0; right: 0; text-align: center; font-size: 8px; color: rgba(255,255,255,0.1); pointer-events: none; }
  
  @keyframes pulse-red { 0%,100% { box-shadow: 0 0 0 0 rgba(255,51,102,0.25); } 50% { box-shadow: 0 0 0 18px rgba(255,51,102,0); } }
  @keyframes pulse-blue { 0%,100% { box-shadow: 0 0 0 0 rgba(96,165,250,0.25); } 50% { box-shadow: 0 0 0 18px rgba(96,165,250,0); } }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<button class="dbg-btn" onclick="document.getElementById('dbg').classList.toggle('show')">📋</button>
<div id="dbg" class="debug"></div>

<div id="capturePage" class="page"></div>
<div id="practicePage" class="page" style="display:none"><p class="placeholder">Practice (placeholder)</p></div>

<div class="version">silence-detect v3.0</div>
<div class="tabs">
  <button class="tab active" id="tabCap" onclick="switchTab('capture')">Capture</button>
  <button class="tab" id="tabPrac" onclick="switchTab('practice')">Practice</button>
</div>

<script>
// ============================
// CONFIG — tuned from diag results
// ============================
const SPEECH_THRESH = 4;        // RMS > this = speech (0-128 scale). Diag showed max 12.77
const SILENCE_THRESH = 2;       // RMS < this = silence
const SILENCE_MS = 800;         // ms of silence after speech → auto-stop
const MIN_SPEECH_MS = 400;      // min speech duration before allowing stop
const MAX_MS = 5500;            // hard cap
const SMOOTHING = 0.1;          // low smoothing for fast response (diag used 0.3)
const FFT = 512;
const METER_SCALE = 8;          // meter width = rms * METER_SCALE %

const GKEY = localStorage.getItem('wordHunter_googleTTSKey') || '';

let lang = 'ja';
let tab = 'capture';
let recording = false;
let stream = null;
let recorder = null;
let audioCtx = null;
let analyser = null;
let rafId = null;
let chunks = [];
let captureT0 = 0;
let speechDetected = false;
let speechT0 = 0;
let silenceT0 = 0;
let stopTimer = null;
let cdTimer = null;
let timeLeft = 6;

const $ = id => document.getElementById(id);
const log = (m, c='#4ade80') => {
  const el = $('dbg');
  const t = new Date();
  el.innerHTML += `<div style="color:${c}">${t.getMinutes()}:${String(t.getSeconds()).padStart(2,'0')}.${String(t.getMilliseconds()).padStart(3,'0')} ${m}</div>`;
  el.scrollTop = el.scrollHeight;
};

// ============================
// TABS
// ============================
function switchTab(t) {
  tab = t;
  $('capturePage').style.display = t === 'capture' ? 'flex' : 'none';
  $('practicePage').style.display = t === 'practice' ? 'flex' : 'none';
  $('tabCap').classList.toggle('active', t === 'capture');
  $('tabPrac').classList.toggle('active', t === 'practice');
  if (t === 'capture') renderIdle();
  if (t !== 'capture' && recording) stop('tab-switch');
}

// ============================
// RENDER
// ============================
function renderIdle() {
  const ja = lang === 'ja';
  $('capturePage').innerHTML = `
    <div class="lang-toggle">
      <button class="lang-btn ${ja?'lang-ja':'lang-off'}" onclick="setLang('ja')">🇯🇵 JA</button>
      <button class="lang-btn ${ja?'lang-off':'lang-en'}" onclick="setLang('en')">🇺🇸 EN</button>
    </div>
    <div class="mic-ring" onclick="startCapture()" style="background:${ja?'rgba(255,51,102,0.12)':'rgba(96,165,250,0.12)'}">
      <div class="mic-circle" style="background:${ja?'#ff3366':'#3b82f6'}"><div class="mic-icon"></div></div>
    </div>
    <div class="status-text" style="color:rgba(255,255,255,0.35)">Tap to record</div>`;
}

function renderRecording() {
  const ja = lang === 'ja';
  const bg = ja ? 'rgba(255,51,102,0.12)' : 'rgba(96,165,250,0.12)';
  const col = ja ? '#ff3366' : '#3b82f6';
  const anim = ja ? 'pulse-red' : 'pulse-blue';
  // Threshold positions on meter (% of width)
  const silPct = (SILENCE_THRESH / (128 / METER_SCALE)).toFixed(1);
  const spPct = (SPEECH_THRESH / (128 / METER_SCALE)).toFixed(1);
  
  $('capturePage').innerHTML = `
    <div class="lang-toggle">
      <button class="lang-btn ${ja?'lang-ja':'lang-off'}" disabled>🇯🇵 JA</button>
      <button class="lang-btn ${ja?'lang-off':'lang-en'}" disabled>🇺🇸 EN</button>
    </div>
    <div class="mic-ring" onclick="stop('tap')" style="background:${bg};animation:${anim} 1.5s ease infinite;cursor:pointer">
      <div class="mic-circle" style="background:${col}"><div class="mic-icon"></div></div>
    </div>
    <div class="status-text">Recording ${ja?'Japanese':'English'}...</div>
    <div class="hint-text">Tap circle when done</div>
    <div class="diag-strip">
      <span id="badge" class="badge badge-wait">WAITING</span>
      <span id="rmsVal" class="rms-val">—</span>
    </div>
    <div class="meter-wrap">
      <div id="meter" class="meter-bar" style="background:rgba(255,255,255,0.15)"></div>
      <div class="thresh-mark" style="left:${spPct}%;background:rgba(255,230,0,0.4)" title="speech"></div>
      <div class="thresh-mark" style="left:${silPct}%;background:rgba(255,51,102,0.3)" title="silence"></div>
    </div>
    <div class="timer" id="timerEl">${timeLeft}s</div>`;
}

function renderProcessing() {
  $('capturePage').innerHTML = `
    <div style="width:44px;height:44px;border:3px solid rgba(255,255,255,0.1);border-top-color:rgba(255,255,255,0.7);border-radius:50%;animation:spin 1s linear infinite"></div>
    <div class="status-text" style="color:rgba(255,255,255,0.3);font-size:13px;margin-top:16px">Processing...</div>`;
}

function renderResult(text, total, breakdown) {
  const ja = lang === 'ja';
  $('capturePage').innerHTML = `
    <div class="lang-toggle">
      <button class="lang-btn ${ja?'lang-ja':'lang-off'}" onclick="setLang('ja')">🇯🇵 JA</button>
      <button class="lang-btn ${ja?'lang-off':'lang-en'}" onclick="setLang('en')">🇺🇸 EN</button>
    </div>
    <div class="result">${text || '(no speech detected)'}</div>
    <div style="margin-top:8px;font-size:12px;color:rgba(255,255,255,0.2)">${total}ms total</div>
    <div style="margin-top:3px;font-size:10px;color:rgba(255,255,255,0.12)">${breakdown}</div>
    <button class="retry-btn" onclick="startCapture()"><span style="display:inline-block;transform:scaleX(-1)">↻</span> Try again</button>`;
}

function renderError(msg) {
  $('capturePage').innerHTML = `
    <div style="width:56px;height:56px;border-radius:50%;background:rgba(252,165,165,0.08);display:flex;align-items:center;justify-content:center;margin-bottom:16px">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#fca5a5" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>
    </div>
    <div style="font-size:14px;font-weight:600;color:#fca5a5;text-align:center;max-width:260px">${msg}</div>
    <button class="retry-btn" onclick="startCapture()"><span style="display:inline-block;transform:scaleX(-1)">↻</span> Try again</button>`;
}

function setLang(l) { lang = l; if (!recording) renderIdle(); }

// ============================
// CAPTURE
// ============================
async function startCapture() {
  if (!GKEY) { renderError('No Google API key. Add in Kanji Hunt Settings.'); return; }
  
  recording = true;
  speechDetected = false;
  silenceT0 = 0;
  speechT0 = 0;
  chunks = [];
  timeLeft = 6;
  
  renderRecording();
  log('🎙 Start (' + lang + ')');
  
  try {
    stream = await navigator.mediaDevices.getUserMedia({ audio: true });
  } catch(e) {
    log('❌ Mic: ' + e.message, '#f87171');
    recording = false;
    renderError('Mic not available');
    return;
  }
  
  // Audio context + analyser
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') await audioCtx.resume();
  log(`🔊 AudioCtx: ${audioCtx.state}, ${audioCtx.sampleRate}Hz`);
  
  const source = audioCtx.createMediaStreamSource(stream);
  analyser = audioCtx.createAnalyser();
  analyser.fftSize = FFT;
  analyser.smoothingTimeConstant = SMOOTHING;
  source.connect(analyser);
  
  // MediaRecorder
  let mime = 'audio/webm';
  for (const f of ['audio/webm;codecs=opus','audio/webm','audio/mp4','audio/wav']) {
    if (MediaRecorder.isTypeSupported(f)) { mime = f; break; }
  }
  recorder = new MediaRecorder(stream, { mimeType: mime });
  recorder.ondataavailable = (e) => { if (e.data?.size > 0) chunks.push(e.data); };
  
  captureT0 = Date.now();
  
  recorder.onstop = async () => {
    stream.getTracks().forEach(t => t.stop());
    cancelAnimationFrame(rafId);
    if (audioCtx) { audioCtx.close(); audioCtx = null; }
    clearTimeout(stopTimer);
    clearInterval(cdTimer);
    recording = false;
    
    if (chunks.length === 0) { renderError('No audio captured'); return; }
    
    const blob = new Blob(chunks, { type: mime });
    const recMs = Date.now() - captureT0;
    log(`🔴 Stopped. ${blob.size}b, ${recMs}ms, ${chunks.length} chunks`);
    
    renderProcessing();
    const apiT0 = Date.now();
    
    try {
      const b64 = await blobToB64(blob);
      const encMs = Date.now() - apiT0;
      
      let enc = 'WEBM_OPUS';
      if (mime.includes('mp4')) enc = 'ENCODING_UNSPECIFIED';
      else if (mime.includes('wav')) enc = 'LINEAR16';
      
      const langCode = lang === 'ja' ? 'ja-JP' : 'en-US';
      const fetchT0 = Date.now();
      
      let resp = await fetch(`https://speech.googleapis.com/v1/speech:recognize?key=${GKEY}`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          config: { encoding: enc, languageCode: langCode, maxAlternatives: 5, model: 'default' },
          audio: { content: b64 },
        }),
      });
      
      if (!resp.ok && enc === 'WEBM_OPUS') {
        log('⚠️ Retry OGG', '#fbbf24');
        resp = await fetch(`https://speech.googleapis.com/v1/speech:recognize?key=${GKEY}`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            config: { encoding: 'OGG_OPUS', languageCode: langCode, maxAlternatives: 5 },
            audio: { content: b64 },
          }),
        });
      }
      if (!resp.ok) throw new Error('API ' + resp.status);
      
      const data = await resp.json();
      const fetchMs = Date.now() - fetchT0;
      const totalMs = Date.now() - captureT0;
      const text = parseSTT(data);
      
      const bk = `rec: ${recMs}ms · encode: ${encMs}ms · api: ${fetchMs}ms`;
      log(`✅ "${text}" (${bk}, total: ${totalMs}ms)`);
      renderResult(text, totalMs, bk);
    } catch(e) {
      log('❌ ' + e.message, '#f87171');
      renderError('Recognition failed');
    }
  };
  
  // Start recording
  recorder.start(1000);
  log('▶️ Recording');
  
  // Countdown
  cdTimer = setInterval(() => {
    timeLeft--;
    const el = $('timerEl');
    if (el) el.textContent = timeLeft + 's';
  }, 1000);
  
  // Hard cap
  stopTimer = setTimeout(() => {
    if (recording) { log('⏰ Hard cap', '#fbbf24'); stop('timeout'); }
  }, MAX_MS);
  
  // Volume monitor
  monitorLoop();
}

function monitorLoop() {
  const buf = new Uint8Array(analyser.frequencyBinCount);
  
  function tick() {
    if (!recording) return;
    
    analyser.getByteTimeDomainData(buf);
    let sum = 0;
    for (let i = 0; i < buf.length; i++) { const v = buf[i] - 128; sum += v * v; }
    const rms = Math.sqrt(sum / buf.length);
    
    const now = Date.now();
    const elapsed = now - captureT0;
    
    // Update meter
    const meter = $('meter');
    const badge = $('badge');
    const rmsEl = $('rmsVal');
    
    if (meter) {
      const pct = Math.min(100, rms * METER_SCALE);
      meter.style.width = pct + '%';
    }
    if (rmsEl) rmsEl.textContent = rms.toFixed(1);
    
    if (!speechDetected) {
      if (rms > SPEECH_THRESH) {
        speechDetected = true;
        speechT0 = now;
        silenceT0 = 0;
        log(`🗣 Speech at ${elapsed}ms (RMS: ${rms.toFixed(1)})`);
        if (badge) { badge.textContent = 'SPEECH'; badge.className = 'badge badge-speech'; }
        if (meter) meter.style.background = '#ffe600';
      } else {
        if (badge) badge.className = 'badge badge-wait';
        if (meter) meter.style.background = 'rgba(255,255,255,0.15)';
      }
    } else {
      if (rms < SILENCE_THRESH) {
        if (!silenceT0) {
          silenceT0 = now;
          log(`🤫 Silence at ${elapsed}ms (RMS: ${rms.toFixed(1)})`);
        }
        const speechDur = (silenceT0 || now) - speechT0;
        const silDur = now - silenceT0;
        
        if (badge) { badge.textContent = `SILENCE ${silDur}ms`; badge.className = 'badge badge-trail'; }
        if (meter) meter.style.background = '#ff3366';
        
        if (silenceT0 && silDur >= SILENCE_MS && speechDur >= MIN_SPEECH_MS) {
          log(`✂️ Auto-stop: ${silDur}ms silence, ${speechDur}ms speech`);
          stop('silence');
          return;
        }
      } else {
        if (silenceT0) {
          log(`🗣 Resumed after ${now - silenceT0}ms`);
        }
        silenceT0 = 0;
        if (badge) { badge.textContent = 'SPEECH'; badge.className = 'badge badge-speech'; }
        if (meter) meter.style.background = '#ffe600';
      }
    }
    
    rafId = requestAnimationFrame(tick);
  }
  
  tick();
}

function stop(reason) {
  if (!recording) return;
  log(`⏹ Stop: ${reason}`);
  recording = false;
  clearTimeout(stopTimer);
  clearInterval(cdTimer);
  cancelAnimationFrame(rafId);
  if (recorder?.state !== 'inactive') recorder.stop();
}

// ============================
// HELPERS
// ============================
function blobToB64(blob) {
  return new Promise((r, j) => {
    const f = new FileReader();
    f.onloadend = () => r(f.result.split(',')[1]);
    f.onerror = () => j(new Error('read'));
    f.readAsDataURL(blob);
  });
}

function parseSTT(data) {
  if (!data.results?.length) return '';
  const alts = data.results[0].alternatives || [];
  if (!alts.length) return '';
  log(`📊 ${(alts[0].confidence*100).toFixed(0)}% conf, ${alts.length} alts`);
  alts.forEach((a,i) => log(`  [${i}] "${a.transcript}" (${(a.confidence*100).toFixed(0)}%)`));
  return lang === 'ja' ? alts[0].transcript.replace(/\s+/g,'') : alts[0].transcript;
}

// INIT
renderIdle();
</script>
</body>
</html>
